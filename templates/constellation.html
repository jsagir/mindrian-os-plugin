<script>
(function() {
  'use strict';

  // -- Thread Config (inline from constellation-config.cjs for browser) --
  var THREAD_COLORS = {
    INFORMS:                 '#2563EB',
    CONTRADICTS:             '#DC2626',
    CONVERGES:               '#D97706',
    ENABLES:                 '#16A34A',
    INVALIDATES:             '#6B7280',
    BELONGS_TO:              '#9CA3AF',
    REASONING_INFORMS:       '#7C3AED',
    HSI_CONNECTION:          '#F59E0B',
    REVERSE_SALIENT:         '#EF4444',
    ANALOGOUS_TO:            '#06B6D4',
    STRUCTURALLY_ISOMORPHIC: '#8B5CF6',
    RESOLVES_VIA:            '#10B981'
  };

  var EDGE_TYPE_LABELS = {
    INFORMS:                 'Informs',
    CONTRADICTS:             'Contradicts',
    CONVERGES:               'Converges',
    ENABLES:                 'Enables',
    INVALIDATES:             'Invalidates',
    BELONGS_TO:              'Belongs To',
    REASONING_INFORMS:       'Reasoning Informs',
    HSI_CONNECTION:          'Surprise',
    REVERSE_SALIENT:         'Bottleneck',
    ANALOGOUS_TO:            'Analogy Bridge',
    STRUCTURALLY_ISOMORPHIC: 'Structural Isomorphism',
    RESOLVES_VIA:            'Resolves Via'
  };

  var THREAD_LINE_STYLES = {
    INFORMS:                 'solid',
    CONTRADICTS:             'solid',
    CONVERGES:               'solid',
    ENABLES:                 'solid',
    INVALIDATES:             'solid',
    BELONGS_TO:              'solid',
    REASONING_INFORMS:       'solid',
    HSI_CONNECTION:          'solid',
    REVERSE_SALIENT:         'solid',
    ANALOGOUS_TO:            'dashed',
    STRUCTURALLY_ISOMORPHIC: 'dashed',
    RESOLVES_VIA:            'dotted'
  };

  // -- Spectral color scale --
  function spectralColor(gap) {
    var t = Math.max(0, Math.min(1, gap || 0));
    var r = Math.round(0x4A + (0xF5 - 0x4A) * t);
    var g = Math.round(0x55 + (0x9E - 0x55) * t);
    var b = Math.round(0x68 + (0x0B - 0x68) * t);
    return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  // -- Load graph data --
  var graphData = null;
  try {
    graphData = JSON.parse('{{GRAPH_JSON}}');
  } catch (_) {
    graphData = { elements: { nodes: [], edges: [] } };
  }

  var rawNodes = (graphData.elements && graphData.elements.nodes) || [];
  var rawEdges = (graphData.elements && graphData.elements.edges) || [];

  // -- Compute degree per node --
  var degreeMap = {};
  rawNodes.forEach(function(n) { degreeMap[n.data.id] = 0; });
  rawEdges.forEach(function(e) {
    degreeMap[e.data.source] = (degreeMap[e.data.source] || 0) + 1;
    degreeMap[e.data.target] = (degreeMap[e.data.target] || 0) + 1;
  });

  // -- Build Cytoscape elements --
  var cyNodes = rawNodes.map(function(n) {
    var d = n.data || {};
    var spectralGap = d.spectral_gap_avg || d.spectral_gap || 0;
    var nodeColor = spectralGap > 0 ? spectralColor(spectralGap) : (d.color || '#5C5A56');

    return {
      data: {
        id: d.id,
        label: d.label || d.id || '',
        color: nodeColor,
        section: d.section || '',
        methodology: d.methodology || '',
        created: d.created || '',
        layer: d.layer || 'content',
        parent_section: d.parent || d.section || '',
        degree: degreeMap[d.id] || 0,
        spectral_gap: spectralGap,
        dominant_mode: d.dominant_mode || '',
        innovation_thesis: d.innovation_thesis || '',
        // Pass through all raw data
        raw: d
      },
      classes: (n.classes || 'artifact')
    };
  });

  var cyEdges = rawEdges.map(function(e) {
    var d = e.data || {};
    var type = d.type || 'BELONGS_TO';
    var cssClass = (e.classes || type.toLowerCase().replace(/_/g, '-'));

    // Mark high-breakthrough HSI edges
    if (type === 'HSI_CONNECTION' && (d.breakthrough_potential || 0) > 0.6) {
      cssClass += ' high-breakthrough';
    }

    return {
      data: {
        id: d.id || ('e' + Math.random().toString(36).slice(2, 8)),
        source: d.source,
        target: d.target,
        type: type,
        label: d.label || '',
        // HSI properties
        hsi_score: d.hsi_score || 0,
        breakthrough_potential: d.breakthrough_potential || 0,
        surprise_type: d.surprise_type || '',
        // Bottleneck properties
        innovation_thesis: d.innovation_thesis || '',
        differential_score: d.differential_score || 0,
        innovation_type: d.innovation_type || '',
        // Analogy properties
        analogy_distance: d.analogy_distance || '',
        structural_fitness: d.structural_fitness || 0,
        source_domain: d.source_domain || '',
        // Resolution properties
        resolution_type: d.resolution_type || '',
        triz_principle: d.triz_principle || '',
        confidence: d.confidence || 0,
        // Raw
        raw: d
      },
      classes: cssClass
    };
  });

  // -- Count edges per type --
  var edgeCounts = {};
  rawEdges.forEach(function(e) {
    var type = (e.data && e.data.type) || 'BELONGS_TO';
    edgeCounts[type] = (edgeCounts[type] || 0) + 1;
  });

  // -- Active filters --
  var activeFilters = {};
  Object.keys(THREAD_COLORS).forEach(function(type) {
    activeFilters[type] = true;
  });

  // -- Build sidebar thread filters (FABRIC-02) --
  var filterContainer = document.getElementById('thread-filters');
  Object.keys(THREAD_COLORS).forEach(function(type) {
    var color = THREAD_COLORS[type];
    var label = EDGE_TYPE_LABELS[type] || type;
    var count = edgeCounts[type] || 0;
    var lineStyle = THREAD_LINE_STYLES[type] || 'solid';

    var toggle = document.createElement('label');
    toggle.className = 'thread-toggle';
    toggle.setAttribute('data-type', type);

    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = true;
    cb.addEventListener('change', function() {
      activeFilters[type] = cb.checked;
      toggle.classList.toggle('disabled', !cb.checked);
      applyFilters();
    });

    var indicator = document.createElement('div');
    indicator.className = 'thread-indicator' + (lineStyle !== 'solid' ? ' ' + lineStyle : '');
    indicator.style.backgroundColor = lineStyle === 'solid' ? color : 'transparent';
    if (lineStyle !== 'solid') {
      indicator.style.borderBottomColor = color;
    }

    var labelEl = document.createElement('span');
    labelEl.className = 'thread-label';
    labelEl.textContent = label;

    var countEl = document.createElement('span');
    countEl.className = 'thread-count';
    countEl.textContent = count;

    toggle.appendChild(cb);
    toggle.appendChild(indicator);
    toggle.appendChild(labelEl);
    toggle.appendChild(countEl);
    filterContainer.appendChild(toggle);
  });

  // -- Cytoscape Stylesheet --
  var cyStyle = [
    // Base node
    {
      selector: 'node',
      style: {
        'label':              'data(label)',
        'text-valign':        'bottom',
        'text-halign':        'center',
        'font-family':        'DM Sans, Inter, sans-serif',
        'font-size':          '11px',
        'color':              '#EEF0F4',
        'text-margin-y':      8,
        'background-color':   'data(color)',
        'border-width':       1,
        'border-color':       '#2A2A2A',
        'width':              'mapData(degree, 0, 20, 24, 56)',
        'height':             'mapData(degree, 0, 20, 24, 56)',
        'text-max-width':     '100px',
        'text-wrap':          'ellipsis',
        'text-background-color': '#0D0D0D',
        'text-background-opacity': 0.7,
        'text-background-padding': '2px',
        'overlay-opacity':    0,
        'transition-property': 'background-color, width, height, border-width, opacity',
        'transition-duration': '0.2s'
      }
    },
    // Section group
    {
      selector: 'node.section-group',
      style: {
        'width': 48, 'height': 48,
        'font-size': '13px', 'font-weight': '700',
        'border-width': 3, 'border-color': 'data(color)',
        'background-opacity': 0.85,
        'text-margin-y': 12,
        'shape': 'round-rectangle'
      }
    },
    // Artifact
    {
      selector: 'node.artifact',
      style: { 'shape': 'ellipse', 'background-opacity': 0.7 }
    },
    // Meeting
    {
      selector: 'node.meeting',
      style: { 'shape': 'diamond', 'background-opacity': 0.75, 'width': 28, 'height': 28 }
    },
    // Selected
    {
      selector: 'node:selected',
      style: {
        'border-width': 4, 'border-color': '#FFFFFF',
        'background-opacity': 1, 'font-size': '13px', 'z-index': 999
      }
    },
    // Dimmed
    { selector: 'node.dimmed', style: { 'opacity': 0.12 } },
    { selector: 'edge.dimmed', style: { 'opacity': 0.04 } },
    // Base edge
    {
      selector: 'edge',
      style: {
        'width': 1.5, 'line-color': '#555', 'target-arrow-color': '#555',
        'curve-style': 'bezier', 'opacity': 0.5,
        'overlay-opacity': 0,
        'transition-property': 'opacity, width, line-color',
        'transition-duration': '0.2s'
      }
    },
    // Hidden (filtered out)
    { selector: 'edge.hidden-filter', style: { 'display': 'none' } },
    // Selected edge
    { selector: 'edge:selected', style: { 'width': 4, 'opacity': 1, 'z-index': 999 } },
    { selector: 'edge.highlighted', style: { 'opacity': 0.9, 'width': 3 } }
  ];

  // Add per-type edge styles
  Object.keys(THREAD_COLORS).forEach(function(type) {
    var color = THREAD_COLORS[type];
    var lineStyle = THREAD_LINE_STYLES[type];
    var cssClass = type.toLowerCase().replace(/_/g, '-');

    var style = {
      'line-color': color,
      'target-arrow-color': color,
      'width': type === 'CONTRADICTS' || type === 'REVERSE_SALIENT' ? 3 : (type === 'BELONGS_TO' ? 1 : 2),
      'opacity': type === 'BELONGS_TO' ? 0.15 : 0.55
    };

    if (lineStyle === 'dashed') {
      style['line-style'] = 'dashed';
      style['line-dash-pattern'] = [8, 4];
    } else if (lineStyle === 'dotted') {
      style['line-style'] = 'dashed';
      style['line-dash-pattern'] = [3, 4];
    }

    // Arrow for directed types
    if (['INFORMS', 'ENABLES', 'INVALIDATES', 'REASONING_INFORMS', 'RESOLVES_VIA'].indexOf(type) >= 0) {
      style['target-arrow-shape'] = 'triangle';
    } else {
      style['target-arrow-shape'] = 'none';
    }

    cyStyle.push({ selector: 'edge.' + cssClass, style: style });
  });

  // HSI high-breakthrough emphasis
  cyStyle.push({
    selector: 'edge.hsi-connection.high-breakthrough',
    style: { 'width': 4, 'opacity': 0.9, 'line-color': '#F59E0B' }
  });

  // -- Initialize Cytoscape --
  var cy = cytoscape({
    container: document.getElementById('cy'),
    elements: { nodes: cyNodes, edges: cyEdges },
    style: cyStyle,
    layout: {
      name: 'cose',
      animate: true,
      animationDuration: 800,
      nodeRepulsion: function() { return 8000; },
      idealEdgeLength: function() { return 120; },
      edgeElasticity: function() { return 100; },
      gravity: 0.25,
      numIter: 300,
      padding: 40,
      randomize: true,
      componentSpacing: 80,
      nestingFactor: 1.2
    },
    minZoom: 0.2,
    maxZoom: 4,
    wheelSensitivity: 0.3
  });

  // -- Update stats --
  document.getElementById('stat-nodes').textContent = cyNodes.length + ' nodes';
  document.getElementById('stat-edges').textContent = cyEdges.length + ' threads';

  // -- Apply thread filters (FABRIC-02) --
  function applyFilters() {
    cy.edges().forEach(function(edge) {
      var type = edge.data('type');
      if (activeFilters[type] === false) {
        edge.addClass('hidden-filter');
      } else {
        edge.removeClass('hidden-filter');
      }
    });
  }

  // -- Layout buttons --
  var layoutBtns = document.querySelectorAll('.layout-btn');
  layoutBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      layoutBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      var layoutName = btn.getAttribute('data-layout');

      var opts = { name: layoutName, animate: true, animationDuration: 600, padding: 40 };
      if (layoutName === 'cose') {
        opts.nodeRepulsion = function() { return 8000; };
        opts.idealEdgeLength = function() { return 120; };
        opts.gravity = 0.25;
        opts.numIter = 300;
        opts.randomize = false;
      } else if (layoutName === 'concentric') {
        opts.concentric = function(node) { return node.data('degree') || 0; };
        opts.levelWidth = function() { return 2; };
        opts.minNodeSpacing = 50;
      } else if (layoutName === 'breadthfirst') {
        opts.directed = true;
        opts.spacingFactor = 1.2;
      }

      cy.layout(opts).run();
    });
  });

  // -- Node click: detail panel --
  var detailPanel = document.getElementById('detail-panel');
  var detailContent = document.getElementById('detail-content');
  var detailClose = document.getElementById('detail-close');

  detailClose.addEventListener('click', function() {
    detailPanel.classList.remove('open');
    cy.elements().removeClass('dimmed');
  });

  cy.on('tap', 'node', function(evt) {
    var node = evt.target;
    var d = node.data();
    showNodeDetail(node, d);
  });

  cy.on('tap', 'edge', function(evt) {
    var edge = evt.target;
    var d = edge.data();
    showEdgeDetail(edge, d);
  });

  // Click background to close
  cy.on('tap', function(evt) {
    if (evt.target === cy) {
      detailPanel.classList.remove('open');
      cy.elements().removeClass('dimmed');
    }
  });

  function showNodeDetail(node, d) {
    // Dim non-connected
    cy.elements().addClass('dimmed');
    node.removeClass('dimmed');
    node.connectedEdges().removeClass('dimmed');
    node.connectedEdges().connectedNodes().removeClass('dimmed');

    var html = '<div class="detail-title">' + escHtml(d.label) + '</div>';
    html += '<div class="detail-section">' + escHtml(d.section || d.parent_section || '') + '</div>';

    html += '<div class="detail-meta">';
    if (d.methodology) html += '<span>Methodology: ' + escHtml(d.methodology) + '</span>';
    if (d.created) html += '<span>Created: ' + escHtml(d.created) + '</span>';
    if (d.spectral_gap) html += '<span>Spectral Gap: ' + Number(d.spectral_gap).toFixed(3) + '</span>';
    if (d.dominant_mode) html += '<span>Dominant Mode: ' + escHtml(d.dominant_mode) + '</span>';
    html += '<span>Connections: ' + (d.degree || 0) + '</span>';
    html += '</div>';

    // Connected threads
    var edges = node.connectedEdges();
    if (edges.length > 0) {
      html += '<div class="detail-threads"><h4>Threads (' + edges.length + ')</h4>';
      edges.forEach(function(edge) {
        var ed = edge.data();
        var color = THREAD_COLORS[ed.type] || '#555';
        var otherNode = edge.source().id() === d.id ? edge.target() : edge.source();
        html += '<div class="detail-thread-item" data-edge-id="' + edge.id() + '">';
        html += '<span class="detail-edge-badge" style="background:' + color + '22; color:' + color + ';">' + (EDGE_TYPE_LABELS[ed.type] || ed.type) + '</span>';
        html += '<span>' + escHtml(otherNode.data('label') || otherNode.id()) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    // Deep link
    if (d.section && d.id) {
      html += '<div style="margin-top:16px;">';
      html += '<a href="claude-cli://open?path=' + encodeURIComponent(d.id) + '" style="color:var(--mondrian-yellow); font-size:12px; text-decoration:none;">Open in Claude Code &rarr;</a>';
      html += '</div>';
    }

    detailContent.innerHTML = html;
    detailPanel.classList.add('open');

    // Click thread item to select that edge
    detailContent.querySelectorAll('.detail-thread-item').forEach(function(item) {
      item.addEventListener('click', function() {
        var edgeId = item.getAttribute('data-edge-id');
        var edge = cy.getElementById(edgeId);
        if (edge.length) {
          showEdgeDetail(edge, edge.data());
        }
      });
    });
  }

  function showEdgeDetail(edge, d) {
    var type = d.type || 'BELONGS_TO';
    var color = THREAD_COLORS[type] || '#555';

    cy.elements().addClass('dimmed');
    edge.removeClass('dimmed');
    edge.source().removeClass('dimmed');
    edge.target().removeClass('dimmed');

    var html = '<div class="edge-detail-type" style="color:' + color + ';">' + (EDGE_TYPE_LABELS[type] || type) + '</div>';
    html += '<div style="font-size:12px; color:var(--text-secondary); margin-bottom:12px;">';
    html += escHtml(edge.source().data('label') || edge.source().id());
    html += ' &rarr; ';
    html += escHtml(edge.target().data('label') || edge.target().id());
    html += '</div>';

    html += '<dl class="edge-detail-props">';

    // Type-specific properties
    if (type === 'HSI_CONNECTION') {
      if (d.hsi_score) { html += '<dt>HSI Score</dt><dd>' + Number(d.hsi_score).toFixed(3) + '</dd>'; }
      if (d.breakthrough_potential) { html += '<dt>Breakthrough Potential</dt><dd>' + Number(d.breakthrough_potential).toFixed(3) + '</dd>'; }
      if (d.surprise_type) { html += '<dt>Surprise Type</dt><dd>' + escHtml(d.surprise_type) + '</dd>'; }
    } else if (type === 'REVERSE_SALIENT') {
      if (d.innovation_thesis) { html += '<dt>Innovation Thesis</dt><dd>' + escHtml(d.innovation_thesis) + '</dd>'; }
      if (d.differential_score) { html += '<dt>Differential Score</dt><dd>' + Number(d.differential_score).toFixed(3) + '</dd>'; }
      if (d.innovation_type) { html += '<dt>Innovation Type</dt><dd>' + escHtml(d.innovation_type) + '</dd>'; }
    } else if (type === 'ANALOGOUS_TO') {
      if (d.analogy_distance) { html += '<dt>Analogy Distance</dt><dd>' + escHtml(d.analogy_distance) + '</dd>'; }
      if (d.structural_fitness) { html += '<dt>Structural Fitness</dt><dd>' + Number(d.structural_fitness).toFixed(3) + '</dd>'; }
      if (d.source_domain) { html += '<dt>Source Domain</dt><dd>' + escHtml(d.source_domain) + '</dd>'; }
    } else if (type === 'RESOLVES_VIA') {
      if (d.resolution_type) { html += '<dt>Resolution Type</dt><dd>' + escHtml(d.resolution_type) + '</dd>'; }
      if (d.triz_principle) { html += '<dt>TRIZ Principle</dt><dd>' + escHtml(d.triz_principle) + '</dd>'; }
      if (d.confidence) { html += '<dt>Confidence</dt><dd>' + Number(d.confidence).toFixed(2) + '</dd>'; }
    } else if (type === 'STRUCTURALLY_ISOMORPHIC') {
      html += '<dt>Type</dt><dd>Structural Isomorphism</dd>';
    } else if (type === 'CONTRADICTS') {
      html += '<dt>Type</dt><dd>Contradiction / Tension</dd>';
    }

    html += '</dl>';

    detailContent.innerHTML = html;
    detailPanel.classList.add('open');
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // -- REVERSE_SALIENT hover tooltip (FABRIC-05) --
  var tooltip = document.getElementById('bottleneck-tooltip');
  var tooltipText = document.getElementById('bottleneck-text');

  cy.on('mouseover', 'edge', function(evt) {
    var edge = evt.target;
    var d = edge.data();
    if (d.type === 'REVERSE_SALIENT' && d.innovation_thesis) {
      tooltipText.textContent = d.innovation_thesis;
      tooltip.classList.add('visible');
    }
  });

  cy.on('mousemove', 'edge', function(evt) {
    if (tooltip.classList.contains('visible')) {
      var pos = evt.renderedPosition || evt.position;
      var container = document.querySelector('.graph-container');
      var rect = container.getBoundingClientRect();
      tooltip.style.left = (pos.x + 16) + 'px';
      tooltip.style.top = (pos.y - 40) + 'px';
    }
  });

  cy.on('mouseout', 'edge', function() {
    tooltip.classList.remove('visible');
  });

  // -- Particle Animation for HSI_CONNECTION (FABRIC-04) --
  var particleCanvas = document.getElementById('particle-canvas');
  var pCtx = particleCanvas.getContext('2d');
  var particles = [];
  var particleAnimId = null;

  function sizeParticleCanvas() {
    var container = document.querySelector('.graph-container');
    var rect = container.getBoundingClientRect();
    particleCanvas.width = rect.width * 2;
    particleCanvas.height = rect.height * 2;
    particleCanvas.style.width = rect.width + 'px';
    particleCanvas.style.height = rect.height + 'px';
    pCtx.setTransform(1, 0, 0, 1, 0, 0);
    pCtx.scale(2, 2);
  }

  sizeParticleCanvas();
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(sizeParticleCanvas).observe(document.querySelector('.graph-container'));
  }

  // Spawn particles on high-breakthrough HSI edges
  function spawnHSIParticles() {
    var hsiEdges = cy.edges().filter(function(e) {
      return e.data('type') === 'HSI_CONNECTION' &&
             (e.data('breakthrough_potential') || 0) > 0.3 &&
             activeFilters['HSI_CONNECTION'] !== false &&
             !e.hasClass('hidden-filter');
    });

    hsiEdges.forEach(function(edge) {
      if (Math.random() > 0.15) return; // Throttle spawn rate
      var srcPos = edge.source().renderedPosition();
      var tgtPos = edge.target().renderedPosition();
      if (!srcPos || !tgtPos) return;

      var bp = edge.data('breakthrough_potential') || 0.5;
      particles.push({
        sx: srcPos.x, sy: srcPos.y,
        tx: tgtPos.x, ty: tgtPos.y,
        t: 0,
        speed: 0.006 + Math.random() * 0.01,
        size: 2 + bp * 3,
        color: '#F59E0B'
      });
    });

    // Also add subtle particles for REVERSE_SALIENT (pulsing glow effect)
    var rsEdges = cy.edges().filter(function(e) {
      return e.data('type') === 'REVERSE_SALIENT' &&
             activeFilters['REVERSE_SALIENT'] !== false &&
             !e.hasClass('hidden-filter');
    });

    rsEdges.forEach(function(edge) {
      if (Math.random() > 0.08) return;
      var srcPos = edge.source().renderedPosition();
      var tgtPos = edge.target().renderedPosition();
      if (!srcPos || !tgtPos) return;

      particles.push({
        sx: srcPos.x, sy: srcPos.y,
        tx: tgtPos.x, ty: tgtPos.y,
        t: 0,
        speed: 0.004 + Math.random() * 0.006,
        size: 2,
        color: '#EF4444'
      });
    });
  }

  function animateParticles() {
    var w = particleCanvas.width / 2;
    var h = particleCanvas.height / 2;
    pCtx.clearRect(0, 0, w, h);

    spawnHSIParticles();

    particles = particles.filter(function(p) {
      p.t += p.speed;
      if (p.t > 1) return false;

      var x = p.sx + (p.tx - p.sx) * p.t;
      var y = p.sy + (p.ty - p.sy) * p.t;
      var alpha = Math.sin(p.t * Math.PI);

      // Main particle
      pCtx.beginPath();
      pCtx.arc(x, y, p.size, 0, Math.PI * 2);
      pCtx.fillStyle = p.color + Math.round(alpha * 200).toString(16).padStart(2, '0');
      pCtx.fill();

      // Glow
      pCtx.beginPath();
      pCtx.arc(x, y, p.size * 2.5, 0, Math.PI * 2);
      pCtx.fillStyle = p.color + Math.round(alpha * 40).toString(16).padStart(2, '0');
      pCtx.fill();

      // Trail
      var tx = p.sx + (p.tx - p.sx) * Math.max(0, p.t - 0.04);
      var ty = p.sy + (p.ty - p.sy) * Math.max(0, p.t - 0.04);
      pCtx.beginPath();
      pCtx.arc(tx, ty, p.size * 0.6, 0, Math.PI * 2);
      pCtx.fillStyle = p.color + Math.round(alpha * 80).toString(16).padStart(2, '0');
      pCtx.fill();

      return true;
    });

    particleAnimId = requestAnimationFrame(animateParticles);
  }

  animateParticles();

  // -- Cleanup --
  window.addEventListener('beforeunload', function() {
    if (particleAnimId) cancelAnimationFrame(particleAnimId);
  });

})();
</script>
</body>
</html>
