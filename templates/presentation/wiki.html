<!DOCTYPE html>
<html lang="en" data-theme="{{THEME}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="generator" content="MindrianOS Presentation System">
<title>{{ROOM_NAME}} -- Wiki</title>
<!-- MindrianOS: This file was generated by the MindrianOS presentation system. Do not edit manually. -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* DE STIJL DARK (default) */
:root{
  --bg:#0D0D0D;--surface:#1A1A1A;--elevated:#2A2A2A;
  --cream:#F5F0E8;--muted:#A09A90;--border:#2A2A2A;
  --sidebar-w:280px;--infobox-w:260px;
  --red:#A63D2F;--yellow:#C8A43C;--blue:#1E3A6E;
  --green:#2D6B4A;--sienna:#B5602A;--purple:#6B4E8B;--teal:#2A6B5E
}

/* LIGHT THEME OVERRIDE */
[data-theme="light"]{
  --bg:#F2F0EC;--surface:#FFFFFF;--elevated:#F0EDE8;
  --cream:#1A1A1A;--muted:#6B6660;--border:#E0DDD8
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--cream);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.wiki-header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:var(--surface);border-bottom:3px solid var(--border);flex-shrink:0;z-index:20}
.wiki-header-left{display:flex;align-items:center;gap:12px}
.wiki-header h1{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;cursor:pointer}
.wiki-header h1:hover{color:var(--yellow)}
.header-right{display:flex;gap:16px;align-items:center}
.search-box{background:var(--elevated);border:1px solid var(--border);color:var(--cream);padding:6px 12px;font-size:13px;font-family:'Inter',sans-serif;width:220px;outline:none;transition:border 150ms}
.search-box:focus{border-color:var(--blue)}
.search-box::placeholder{color:var(--muted)}
.stage-tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border:1px solid var(--blue);color:var(--blue);text-transform:uppercase;letter-spacing:1px}
.back-link{font-size:11px;color:var(--muted);text-decoration:none;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
.back-link:hover{color:var(--cream)}

/* LAYOUT */
.wiki-body{display:flex;flex:1;min-height:0}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:2px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0}
.sb-section-head{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background 150ms;font-size:13px;font-weight:600;color:var(--cream)}
.sb-section-head:hover{background:var(--elevated)}
.sb-arrow{font-size:8px;color:var(--muted);transition:transform 150ms;display:inline-block;width:12px}
.sb-section.open .sb-arrow{transform:rotate(90deg)}
.sb-section-name{flex:1;font-size:12px;text-transform:uppercase;letter-spacing:0.8px}
.sb-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:var(--elevated);padding:1px 6px}
.sb-items{display:none;padding:0 0 4px 0}
.sb-section.open .sb-items{display:block}
.sb-item{padding:6px 16px 6px 36px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 150ms;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item:hover{background:var(--elevated);color:var(--cream);border-left-color:var(--sc,#555)}
.sb-item.active{background:var(--elevated);color:var(--cream);border-left-color:var(--sc,var(--yellow))}
.sb-home{padding:8px 16px;font-size:12px;font-weight:600;color:var(--cream);cursor:pointer;margin-bottom:4px}
.sb-home:hover{background:var(--elevated)}

/* CONTENT AREA */
.content-area{flex:1;display:flex;min-width:0;overflow:hidden}
.article{flex:1;overflow-y:auto;padding:32px 48px 64px}
.article-header{margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid var(--border)}
.article-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1.1}
.article-meta{display:flex;gap:16px;margin-top:8px;align-items:center;flex-wrap:wrap}
.article-section-tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 8px;text-transform:uppercase;letter-spacing:1px}
.article-words{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

/* INFOBOX */
.infobox-panel{width:var(--infobox-w);background:var(--surface);border-left:2px solid var(--border);overflow-y:auto;flex-shrink:0;padding:16px;font-size:12px}
.infobox-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.infobox-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(42,42,42,0.5)}
.infobox-key{color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:0.5px;flex-shrink:0}
.infobox-val{color:var(--cream);text-align:right;max-width:150px;word-break:break-word;font-size:11px}
.infobox-section-badge{display:inline-block;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:8px}
.infobox-related{margin-top:12px}
.infobox-related-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.infobox-related-item{font-size:11px;color:var(--blue);cursor:pointer;padding:2px 0;display:block}
.infobox-related-item:hover{color:var(--cream);text-decoration:underline}

/* TOC */
.toc-section{margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}
.toc-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.toc-item{font-size:11px;color:var(--muted);padding:2px 0;cursor:pointer;display:block;text-decoration:none;transition:color 150ms}
.toc-item:hover{color:var(--cream)}
.toc-item.h3{padding-left:12px;font-size:10px}

/* MARKDOWN */
.md h1{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--cream);margin:28px 0 12px;letter-spacing:1px}
.md h2{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--cream);margin:24px 0 8px;letter-spacing:1px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.md h3{font-size:15px;font-weight:600;color:var(--cream);margin:16px 0 6px}
.md p{font-size:14px;line-height:1.75;color:#CCC;margin-bottom:12px;max-width:72ch}
.md ul,.md ol{padding-left:20px;margin-bottom:12px}
.md li{font-size:14px;line-height:1.7;color:#CCC;margin-bottom:3px}
.md strong{color:var(--cream)}
.md em{color:var(--muted);font-style:normal;font-weight:500}
.md code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--surface);padding:2px 6px;color:#E8B86D}
.md pre{background:var(--surface);padding:16px;overflow-x:auto;margin-bottom:12px;border-left:3px solid var(--elevated)}
.md pre code{background:none;padding:0}
.md blockquote{border-left:3px solid var(--elevated);padding-left:16px;color:var(--muted);margin-bottom:12px}
.md a{color:var(--blue);text-decoration:none}
.md a:hover{text-decoration:underline}
.md hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.md table{border-collapse:collapse;margin-bottom:16px;width:100%}
.md th{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:2px solid var(--border);padding:8px 12px;text-align:left}
.md td{font-size:13px;padding:8px 12px;border-bottom:1px solid var(--border);color:#CCC}
.md img{max-width:100%;height:auto;margin:12px 0}

[data-theme="light"] .md p,
[data-theme="light"] .md li,
[data-theme="light"] .md td{color:#333}

/* WIKILINK */
.wikilink{color:var(--blue);cursor:pointer;text-decoration:none;border-bottom:1px dashed var(--blue)}
.wikilink:hover{color:var(--cream);border-bottom-color:var(--cream)}

/* SEARCH RESULTS */
.search-results{position:absolute;top:48px;right:24px;width:360px;max-height:400px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);z-index:30;display:none}
.search-results.show{display:block}
.sr-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 150ms}
.sr-item:hover{background:var(--elevated)}
.sr-title{font-size:13px;color:var(--cream)}
.sr-section{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.sr-snippet{font-size:11px;color:var(--muted);margin-top:4px}

/* HOME PAGE */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:3px}
.home-card{background:var(--surface);border-left:4px solid var(--sc,#555);padding:20px;cursor:pointer;transition:background 150ms}
.home-card:hover{background:var(--elevated)}
.home-card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:4px}
.home-card-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
.home-card-summary{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.5}

/* FOOTER */
.wiki-footer{position:fixed;bottom:0;left:0;right:0;display:flex;flex-direction:column;z-index:20;pointer-events:none}
.footer-text{text-align:center;padding:4px 0;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:1px;background:var(--surface);border-top:1px solid var(--border)}
.mondrian-bar{height:3px;display:flex}
.mondrian-bar span{flex:1}

/* LOGO */
.mos-logo{width:18px;height:18px;flex-shrink:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:#CCC}
</style>
</head>
<body>

<div class="wiki-header">
  <div class="wiki-header-left">
    <svg class="mos-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="10" height="10" fill="var(--red)"/>
      <rect x="13" y="1" width="10" height="5" fill="var(--yellow)"/>
      <rect x="13" y="8" width="10" height="3" fill="var(--blue)"/>
      <rect x="1" y="13" width="5" height="10" fill="var(--green)"/>
      <rect x="8" y="13" width="15" height="10" fill="var(--surface)" stroke="var(--muted)" stroke-width="0.5"/>
    </svg>
    <h1 onclick="showHome()" id="wiki-title"></h1>
  </div>
  <div class="header-right">
    <input class="search-box" id="search" placeholder="Search articles..." oninput="doSearch(this.value)" onfocus="if(this.value)doSearch(this.value)">
    <div class="search-results" id="search-results"></div>
    <span class="stage-tag" id="stage-tag"></span>
    <a class="back-link" href="index.html">Dashboard</a>
  </div>
</div>

<div class="wiki-body">
  <div class="sidebar" id="sidebar"></div>
  <div class="content-area">
    <div class="article" id="article"></div>
    <div class="infobox-panel" id="infobox-panel"></div>
  </div>
</div>

<div class="wiki-footer">
  <div class="footer-text">Built with MindrianOS</div>
  <div class="mondrian-bar">
    <span style="background:var(--red);flex:3"></span>
    <span style="background:var(--yellow);flex:2"></span>
    <span style="background:var(--blue);flex:4"></span>
    <span style="background:var(--green);flex:1"></span>
    <span style="background:var(--sienna);flex:2"></span>
    <span style="background:var(--purple);flex:1"></span>
    <span style="background:var(--teal);flex:3"></span>
  </div>
</div>

<script>const ROOM_DATA = /*ROOM_DATA_PLACEHOLDER*/{};</script>
<script>
(function() {
  'use strict';

  // --- Build lookup indexes ---
  const sections = ROOM_DATA.sections || [];
  const graph = ROOM_DATA.graph || { elements: { nodes: [], edges: [] } };
  const allArtifacts = [];
  const artifactByFile = {};
  const artifactByTitle = {};

  sections.forEach(sec => {
    (sec.artifacts || []).forEach(art => {
      const entry = { ...art, sectionId: sec.id, sectionLabel: sec.label, sectionColor: sec.color, lightText: sec.lightText };
      allArtifacts.push(entry);
      artifactByFile[art.filename] = entry;
      // Index by lowercase title for wikilink lookup
      artifactByTitle[art.title.toLowerCase()] = entry;
    });
  });

  let currentArtifact = null;

  // --- Set header ---
  document.getElementById('wiki-title').textContent = (ROOM_DATA.roomName || 'Room') + ' Wiki';
  document.getElementById('stage-tag').textContent = ROOM_DATA.stage || '';

  // --- Build sidebar ---
  function buildSidebar() {
    const sb = document.getElementById('sidebar');
    let html = '<div class="sb-home" onclick="showHome()">Home</div>';

    sections.forEach((sec, idx) => {
      const openClass = idx === 0 ? ' open' : '';
      html += '<div class="sb-section' + openClass + '" data-section="' + sec.id + '">';
      html += '<div class="sb-section-head" onclick="toggleSection(this)" style="--sc:' + sec.color + '">';
      html += '<span class="sb-arrow">&#9654;</span>';
      html += '<span class="sb-section-name">' + escHtml(sec.label) + '</span>';
      html += '<span class="sb-count">' + (sec.artifacts ? sec.artifacts.length : sec.entryCount || 0) + '</span>';
      html += '</div>';
      html += '<div class="sb-items">';
      (sec.artifacts || []).forEach(art => {
        html += '<div class="sb-item" onclick="loadArtifact(\'' + escAttr(art.filename) + '\')" data-key="' + escAttr(art.filename) + '" style="--sc:' + sec.color + '">' + escHtml(art.title) + '</div>';
      });
      html += '</div></div>';
    });

    sb.innerHTML = html;
  }

  // --- Show home (section overview) ---
  window.showHome = function() {
    currentArtifact = null;
    clearActiveItem();
    const articleEl = document.getElementById('article');
    const infoEl = document.getElementById('infobox-panel');

    const totalArtifacts = allArtifacts.length;
    const nonEmpty = sections.filter(s => (s.artifacts || []).length > 0).length;

    let html = '<div class="article-header">';
    html += '<div class="article-title">' + escHtml(ROOM_DATA.roomName || 'Room') + '</div>';
    html += '<div class="article-meta">';
    html += '<span class="article-words">' + totalArtifacts + ' articles across ' + sections.length + ' sections</span>';
    html += '<span class="stage-tag">' + escHtml(ROOM_DATA.stage || '') + '</span>';
    html += '</div></div>';

    html += '<div class="home-grid">';
    sections.forEach(sec => {
      const count = sec.artifacts ? sec.artifacts.length : sec.entryCount || 0;
      if (count === 0) return;
      html += '<div class="home-card" style="--sc:' + sec.color + '" onclick="openSection(\'' + escAttr(sec.id) + '\')">';
      html += '<div class="home-card-title">' + escHtml(sec.label) + '</div>';
      html += '<div class="home-card-count">' + count + ' article' + (count !== 1 ? 's' : '') + '</div>';
      if (sec.summary) html += '<div class="home-card-summary">' + escHtml(sec.summary) + '</div>';
      html += '</div>';
    });
    html += '</div>';

    articleEl.innerHTML = html;

    // Infobox: show room stats
    let info = '<div class="infobox-title">Room Info</div>';
    const stats = ROOM_DATA.stats || {};
    if (stats.artifacts) info += infoRow('Artifacts', stats.artifacts);
    if (stats.meetings) info += infoRow('Meetings', stats.meetings);
    if (stats.speakers) info += infoRow('Speakers', stats.speakers);
    if (stats.sections) info += infoRow('Sections', stats.sections);
    if (ROOM_DATA.generatedDate) info += infoRow('Generated', ROOM_DATA.generatedDate);
    infoEl.innerHTML = info;
  };

  // --- Open section (expand in sidebar and load first artifact) ---
  window.openSection = function(secId) {
    const el = document.querySelector('.sb-section[data-section="' + secId + '"]');
    if (el && !el.classList.contains('open')) el.classList.add('open');
    const sec = sections.find(s => s.id === secId);
    if (sec && sec.artifacts && sec.artifacts.length > 0) {
      loadArtifact(sec.artifacts[0].filename);
    }
  };

  // --- Load artifact ---
  window.loadArtifact = function(filename) {
    const art = artifactByFile[filename];
    if (!art) return;
    currentArtifact = art;

    // Highlight sidebar item
    clearActiveItem();
    const sbItem = document.querySelector('.sb-item[data-key="' + filename + '"]');
    if (sbItem) {
      sbItem.classList.add('active');
      const sec = sbItem.closest('.sb-section');
      if (sec && !sec.classList.contains('open')) sec.classList.add('open');
    }

    const articleEl = document.getElementById('article');
    const infoEl = document.getElementById('infobox-panel');

    // Process wikilinks: [[Title]] -> clickable links
    let content = art.content || '';
    content = content.replace(/\[\[([^\]]+)\]\]/g, function(match, title) {
      const target = artifactByTitle[title.toLowerCase()];
      if (target) {
        return '<a class="wikilink" onclick="loadArtifact(\'' + escAttr(target.filename) + '\')">' + escHtml(title) + '</a>';
      }
      return '<span style="color:var(--muted)" title="No article found">' + escHtml(title) + '</span>';
    });

    // Render markdown
    let rendered = marked.parse(content);

    // Add heading IDs for TOC
    rendered = rendered.replace(/<(h[23])>(.*?)<\/\1>/g, function(match, tag, text) {
      const slug = text.replace(/<[^>]*>/g, '').replace(/[^a-z0-9]+/gi, '-').toLowerCase().replace(/^-|-$/g, '');
      return '<' + tag + ' id="' + slug + '">' + text + '</' + tag + '>';
    });

    // Article header
    const tagBg = art.sectionColor;
    const tagColor = art.lightText ? '#fff' : '#0D0D0D';
    let html = '<div class="article-header">';
    html += '<div class="article-title">' + escHtml(art.title) + '</div>';
    html += '<div class="article-meta">';
    html += '<span class="article-section-tag" style="background:' + tagBg + ';color:' + tagColor + '">' + escHtml(art.sectionLabel) + '</span>';
    html += '<span class="article-words">' + (art.wordCount || 0) + ' words</span>';
    html += '</div></div>';
    html += '<div class="md">' + rendered + '</div>';

    articleEl.innerHTML = html;
    articleEl.scrollTop = 0;

    // --- Build infobox ---
    let info = '';

    // Frontmatter fields
    const fm = art.frontmatter || {};
    const fmKeys = Object.keys(fm).filter(k => k !== 'title' && k !== 'content');
    if (fmKeys.length > 0) {
      info += '<div class="infobox-title">Properties</div>';
      fmKeys.forEach(k => {
        let val = fm[k];
        if (typeof val === 'object') val = JSON.stringify(val);
        info += infoRow(k, val);
      });
    }

    // Section badge
    info += '<div class="infobox-section-badge" style="background:' + tagBg + ';color:' + tagColor + '">' + escHtml(art.sectionLabel) + '</div>';

    // Related artifacts from graph
    const related = findRelated(art.filename);
    if (related.length > 0) {
      info += '<div class="infobox-related"><div class="infobox-related-title">Related Articles</div>';
      related.forEach(r => {
        info += '<a class="infobox-related-item" onclick="loadArtifact(\'' + escAttr(r.filename) + '\')">' + escHtml(r.title) + '</a>';
      });
      info += '</div>';
    }

    // TOC from headings
    const headings = [];
    rendered.replace(/<h([23]) id="([^"]*)">(.*?)<\/h[23]>/g, function(m, level, id, text) {
      headings.push({ level: parseInt(level), id: id, text: text.replace(/<[^>]*>/g, '') });
    });
    if (headings.length > 0) {
      info += '<div class="toc-section"><div class="toc-title">Contents</div>';
      headings.forEach(h => {
        const cls = h.level === 3 ? ' h3' : '';
        info += '<a class="toc-item' + cls + '" onclick="scrollToHeading(\'' + escAttr(h.id) + '\')">' + escHtml(h.text) + '</a>';
      });
      info += '</div>';
    }

    infoEl.innerHTML = info;
  };

  // --- Scroll to heading ---
  window.scrollToHeading = function(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  // --- Find related artifacts via graph edges ---
  function findRelated(filename) {
    const edges = (graph.elements && graph.elements.edges) || [];
    const related = new Set();
    edges.forEach(e => {
      const src = e.data ? e.data.source : e.source;
      const tgt = e.data ? e.data.target : e.target;
      if (src === filename && artifactByFile[tgt]) related.add(tgt);
      if (tgt === filename && artifactByFile[src]) related.add(src);
    });
    return Array.from(related).map(f => artifactByFile[f]).filter(Boolean).slice(0, 8);
  }

  // --- Toggle sidebar section ---
  window.toggleSection = function(el) {
    el.closest('.sb-section').classList.toggle('open');
  };

  // --- Search ---
  window.doSearch = function(query) {
    const results = document.getElementById('search-results');
    if (!query || query.length < 2) { results.classList.remove('show'); return; }
    const q = query.toLowerCase();
    let html = '';
    let count = 0;

    allArtifacts.forEach(art => {
      const titleMatch = art.title.toLowerCase().includes(q);
      const contentMatch = (art.content || '').toLowerCase().includes(q);
      if (titleMatch || contentMatch) {
        let snippet = '';
        if (contentMatch) {
          const idx = art.content.toLowerCase().indexOf(q);
          const start = Math.max(0, idx - 40);
          const end = Math.min(art.content.length, idx + q.length + 60);
          snippet = '...' + escHtml(art.content.substring(start, end)) + '...';
        }
        html += '<div class="sr-item" onclick="loadArtifact(\'' + escAttr(art.filename) + '\');closeSearch()">';
        html += '<div class="sr-title">' + escHtml(art.title) + '</div>';
        html += '<div class="sr-section">' + escHtml(art.sectionLabel) + '</div>';
        if (snippet) html += '<div class="sr-snippet">' + snippet + '</div>';
        html += '</div>';
        count++;
      }
    });

    if (count === 0) html = '<div class="sr-item"><div class="sr-title" style="color:var(--muted)">No results found</div></div>';
    results.innerHTML = html;
    results.classList.add('show');
  };

  window.closeSearch = function() {
    document.getElementById('search-results').classList.remove('show');
    document.getElementById('search').value = '';
  };

  // Close search on outside click
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.header-right')) {
      document.getElementById('search-results').classList.remove('show');
    }
  });

  // --- Helpers ---
  function clearActiveItem() {
    document.querySelectorAll('.sb-item.active').forEach(el => el.classList.remove('active'));
  }

  function infoRow(key, val) {
    return '<div class="infobox-row"><span class="infobox-key">' + escHtml(String(key)) + '</span><span class="infobox-val">' + escHtml(String(val)) + '</span></div>';
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s).replace(/'/g, "\\'").replace(/"/g, '&quot;');
  }

  // --- Initialize ---
  buildSidebar();

  // Auto-load first artifact or show home
  if (allArtifacts.length > 0) {
    showHome();
    // Open first section and load first artifact
    if (sections.length > 0 && sections[0].artifacts && sections[0].artifacts.length > 0) {
      loadArtifact(sections[0].artifacts[0].filename);
    }
  } else {
    showHome();
  }

})();
</script>
</body>
</html>
