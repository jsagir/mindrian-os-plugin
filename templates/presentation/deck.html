<!DOCTYPE html>
<html lang="en" data-theme="{{THEME}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="generator" content="MindrianOS Presentation System">
<title>{{ROOM_NAME}} -- Deck</title>
<!-- MindrianOS: This file was generated by the MindrianOS presentation system. Do not edit manually. -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* DE STIJL DARK (default) */
:root{
  --bg:#0D0D0D;--card:#1A1A1A;--card-alt:#141414;
  --text:#E8E4DD;--text-muted:#8A8680;
  --red:#A63D2F;--yellow:#C8A43C;--blue:#1E3A6E;
  --green:#2D6B4A;--sienna:#B5602A;--purple:#6B4E8B;--teal:#2A6B5E;
  --white:#FFFFFF
}

/* LIGHT THEME OVERRIDE */
[data-theme="light"]{
  --bg:#F2F0EC;--card:#FFFFFF;--card-alt:#F8F6F2;
  --text:#1A1A1A;--text-muted:#6B6660
}

body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;height:100vh;width:100vw}

/* DECK + SLIDES */
.deck{position:relative;width:100vw;height:100vh}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:80px 100px 100px;transform:translateX(100%);opacity:0;transition:transform 400ms ease,opacity 300ms ease;pointer-events:none}
.slide.active{transform:translateX(0);opacity:1;pointer-events:auto}
.slide.prev{transform:translateX(-100%);opacity:0}

/* TYPOGRAPHY */
h1,h2,h3{font-family:'Bebas Neue',sans-serif;text-transform:uppercase;letter-spacing:0.04em;line-height:1.0}
.slide h1{font-size:6vw}
.slide h2{font-size:3.5vw}
.slide h3{font-size:2.2vw}
p,li{font-family:'Inter',sans-serif;font-size:1.3vw;line-height:1.6;font-weight:300}
.data{font-family:'JetBrains Mono',monospace;font-weight:700}
.big-number{font-family:'JetBrains Mono',monospace;font-size:10vw;font-weight:700;line-height:0.9}
.medium-number{font-family:'JetBrains Mono',monospace;font-size:5vw;font-weight:700;line-height:1.0}

/* ACCENT COLORS */
.accent-red{color:var(--red)}.accent-yellow{color:var(--yellow)}.accent-blue{color:var(--blue)}
.accent-green{color:var(--green)}.accent-sienna{color:var(--sienna)}.accent-purple{color:var(--purple)}.accent-teal{color:var(--teal)}

.tag{display:inline-block;padding:4px 16px;font-family:'JetBrains Mono',monospace;font-size:0.85vw;font-weight:500;text-transform:uppercase;letter-spacing:0.12em}

/* LAYOUT HELPERS */
.center-content{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%}
.split{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;height:100%}
.stack{display:flex;flex-direction:column;gap:24px}
.stack-wide{display:flex;flex-direction:column;gap:40px}

/* CARDS */
.card{background:var(--card);padding:32px;border-left:4px solid transparent}
.card-red{border-left-color:var(--red)}.card-yellow{border-left-color:var(--yellow)}
.card-blue{border-left-color:var(--blue)}.card-green{border-left-color:var(--green)}
.card-sienna{border-left-color:var(--sienna)}.card-purple{border-left-color:var(--purple)}.card-teal{border-left-color:var(--teal)}

/* STAT BLOCKS */
.stat-block{background:var(--card);padding:28px 24px;text-align:center}
.stat-block .value{font-family:'JetBrains Mono',monospace;font-size:3.2vw;font-weight:700;display:block;margin-bottom:8px}
.stat-block .label{font-family:'Inter',sans-serif;font-size:0.9vw;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}

/* QUOTE */
.quote{font-family:'Inter',sans-serif;font-size:2.2vw;font-weight:300;font-style:italic;line-height:1.5;padding-left:32px;border-left:4px solid var(--yellow);color:var(--text);max-width:900px}

/* SECTION LABEL */
.section-label{position:absolute;top:40px;left:100px;font-family:'JetBrains Mono',monospace;font-size:0.7vw;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);opacity:0.6}

/* BULLET LIST */
.slide-bullets{list-style:none;padding:0}
.slide-bullets li{font-size:1.3vw;line-height:1.8;padding-left:24px;position:relative;margin-bottom:8px}
.slide-bullets li::before{content:'';position:absolute;left:0;top:12px;width:8px;height:8px;background:var(--yellow)}

/* OPPORTUNITIES GRID */
.opp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;width:100%;max-width:1100px}
.opp-card{background:var(--card);padding:20px;border-left:3px solid var(--yellow)}
.opp-card h4{font-family:'Bebas Neue',sans-serif;font-size:1.4vw;margin-bottom:6px}
.opp-card p{font-size:0.9vw;color:var(--text-muted)}

/* INTEL ITEM */
.intel-item{background:var(--card);padding:16px 20px;border-left:3px solid var(--blue);margin-bottom:8px;font-size:1vw}

/* SECTION ACCENT BAR */
.section-accent{height:4px;width:120px;margin-bottom:16px}

/* LOGO */
.slide-logo{position:absolute;top:24px;right:40px;height:16px;width:16px;opacity:0.5}

/* MARKDOWN in slides */
.slide-md h1,.slide-md h2,.slide-md h3{font-family:'Bebas Neue',sans-serif}
.slide-md p{font-size:1.1vw;line-height:1.6;color:var(--text);max-width:60ch}
.slide-md ul{padding-left:20px}
.slide-md li{font-size:1.1vw;margin-bottom:4px}
.slide-md strong{color:var(--text)}

/* NAV DOTS */
.nav-dots{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:200}
.nav-dot{width:8px;height:8px;background:var(--text-muted);opacity:0.3;cursor:pointer;transition:opacity 200ms,background 200ms}
.nav-dot.active{opacity:1;background:var(--yellow)}
.nav-dot:hover{opacity:0.7}

/* PROGRESS BAR */
.progress-bar{position:fixed;bottom:0;left:0;height:3px;background:var(--yellow);z-index:201;transition:width 400ms ease}

/* CONTROLS */
.controls{position:fixed;bottom:20px;right:30px;display:flex;align-items:center;gap:16px;z-index:200}
.slide-counter{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text-muted)}

/* MONDRIAN BAR */
.mondrian-bar{position:fixed;bottom:0;left:0;right:0;height:6px;display:flex;z-index:100}
.mondrian-bar span{flex:1}

/* OVERVIEW MODE */
.overview-mode .deck{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:40px;width:auto;height:auto;overflow-y:auto}
.overview-mode .slide{position:relative;transform:none!important;opacity:1!important;pointer-events:auto!important;width:100%;height:200px;padding:20px;cursor:pointer;border:2px solid transparent;transition:border 200ms}
.overview-mode .slide:hover{border-color:var(--yellow)}
.overview-mode .slide.active{border-color:var(--yellow)}
.overview-mode .slide h1{font-size:1.4vw}.overview-mode .slide h2{font-size:1.2vw}.overview-mode .slide h3{font-size:1vw}
.overview-mode .slide p,.overview-mode .slide li{font-size:0.6vw}
.overview-mode .nav-dots,.overview-mode .progress-bar,.overview-mode .controls{display:none}

/* RESPONSIVE */
@media(max-width:1024px){
  .slide{padding:60px 50px 80px}
  .slide h1{font-size:8vw}
  .split{grid-template-columns:1fr;gap:30px}
}
</style>
</head>
<body>

<div class="deck" id="deck"></div>

<!-- MONDRIAN ACCENT BAR -->
<div class="mondrian-bar">
  <span style="background:var(--red);flex:3"></span>
  <span style="background:var(--yellow);flex:2"></span>
  <span style="background:var(--blue);flex:4"></span>
  <span style="background:var(--green);flex:1"></span>
  <span style="background:var(--sienna);flex:2"></span>
  <span style="background:var(--purple);flex:1"></span>
  <span style="background:var(--teal);flex:3"></span>
</div>

<!-- NAV DOTS -->
<div class="nav-dots" id="nav-dots"></div>

<!-- PROGRESS BAR -->
<div class="progress-bar" id="progress-bar"></div>

<!-- CONTROLS -->
<div class="controls">
  <span class="slide-counter"><span id="current">1</span> / <span id="total">1</span></span>
</div>

<script>const ROOM_DATA = /*ROOM_DATA_PLACEHOLDER*/{};</script>
<script>
(function() {
  'use strict';

  const deck = document.getElementById('deck');
  const navDotsEl = document.getElementById('nav-dots');
  const progressBar = document.getElementById('progress-bar');
  const currentEl = document.getElementById('current');
  const totalEl = document.getElementById('total');

  const sections = ROOM_DATA.sections || [];
  const minto = ROOM_DATA.minto || {};
  const stats = ROOM_DATA.stats || {};
  const intelligence = ROOM_DATA.intelligence || {};
  const opportunities = ROOM_DATA.opportunities || [];
  const roomName = ROOM_DATA.roomName || 'Room';
  const stage = ROOM_DATA.stage || '';
  const generatedDate = ROOM_DATA.generatedDate || '';

  const SECTION_COLORS = ['--red','--yellow','--blue','--green','--sienna','--purple','--teal'];

  // --- Build slides ---
  const slides = [];

  function addSlide(type, html) {
    slides.push({ type: type, html: html });
  }

  function logoSvg() {
    return '<svg class="slide-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">'
      + '<rect x="1" y="1" width="10" height="10" fill="var(--red)"/>'
      + '<rect x="13" y="1" width="10" height="5" fill="var(--yellow)"/>'
      + '<rect x="13" y="8" width="10" height="3" fill="var(--blue)"/>'
      + '<rect x="1" y="13" width="5" height="10" fill="var(--green)"/>'
      + '<rect x="8" y="13" width="15" height="10" fill="var(--card)" stroke="var(--text-muted)" stroke-width="0.5"/>'
      + '</svg>';
  }

  // 1. Title slide
  addSlide('title',
    '<div class="center-content" style="gap:40px">' + logoSvg()
    + '<h1>' + esc(roomName) + '</h1>'
    + (stage ? '<span class="tag" style="background:var(--yellow);color:#0D0D0D">' + esc(stage) + '</span>' : '')
    + (generatedDate ? '<p style="color:var(--text-muted);font-size:0.9vw">' + esc(generatedDate) + '</p>' : '')
    + '<p style="font-size:1vw;color:var(--text-muted);margin-top:40px;letter-spacing:0.1em;font-family:\'JetBrains Mono\',monospace">BUILT WITH MINDRIANOS</p>'
    + '</div>'
  );

  // 2. Governing thought slide
  if (minto.governing_thought) {
    addSlide('quote',
      '<div class="center-content" style="gap:40px">' + logoSvg()
      + '<span class="section-label">Governing Thought</span>'
      + '<div class="quote">' + esc(minto.governing_thought) + '</div>'
      + '</div>'
    );
  }

  // 3. Per-section slides
  sections.forEach(function(sec, idx) {
    if (!sec.artifacts || sec.artifacts.length === 0) return;
    const colorVar = SECTION_COLORS[idx % SECTION_COLORS.length];
    const color = sec.color || 'var(' + colorVar + ')';

    // Get key points from minto section or first artifact
    let keyPoints = [];
    if (minto.sections) {
      const mintoSec = minto.sections.find(function(ms) {
        return ms.title.toLowerCase().includes(sec.label.toLowerCase())
          || sec.label.toLowerCase().includes(ms.title.toLowerCase());
      });
      if (mintoSec && mintoSec.key_points) keyPoints = mintoSec.key_points;
    }
    if (keyPoints.length === 0 && sec.summary) {
      keyPoints = [sec.summary];
    }

    // Main section slide
    let html = logoSvg();
    html += '<span class="section-label">' + esc(sec.label) + '</span>';
    html += '<div class="stack-wide" style="height:100%;justify-content:center">';
    html += '<div class="section-accent" style="background:' + color + '"></div>';
    html += '<h2>' + esc(sec.label) + '</h2>';
    if (keyPoints.length > 0) {
      html += '<ul class="slide-bullets">';
      keyPoints.forEach(function(pt) {
        html += '<li style="--bullet-color:' + color + '">' + esc(pt) + '</li>';
      });
      html += '</ul>';
    }
    html += '<span class="tag" style="background:' + color + ';color:' + (sec.lightText ? '#fff' : '#0D0D0D') + '">'
      + sec.artifacts.length + ' artifact' + (sec.artifacts.length !== 1 ? 's' : '') + '</span>';
    html += '</div>';
    addSlide('content', html);

    // Deep-dive slide for sections with >3 artifacts
    if (sec.artifacts.length > 3) {
      let ddHtml = logoSvg();
      ddHtml += '<span class="section-label">' + esc(sec.label) + ' - Deep Dive</span>';
      ddHtml += '<div class="stack" style="height:100%;justify-content:center">';
      ddHtml += '<div class="section-accent" style="background:' + color + '"></div>';
      ddHtml += '<h3>' + esc(sec.label) + ' - Key Artifacts</h3>';
      ddHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
      sec.artifacts.slice(0, 6).forEach(function(art) {
        ddHtml += '<div class="card" style="border-left-color:' + color + '">';
        ddHtml += '<h3 style="font-size:1.3vw;margin-bottom:6px">' + esc(art.title) + '</h3>';
        ddHtml += '<p style="font-size:0.85vw;color:var(--text-muted)">' + (art.wordCount || 0) + ' words</p>';
        ddHtml += '</div>';
      });
      ddHtml += '</div></div>';
      addSlide('content', ddHtml);
    }
  });

  // 4. Stats slide
  var hasStats = stats.artifacts || stats.meetings || stats.speakers || stats.sections;
  if (hasStats) {
    var statsHtml = logoSvg();
    statsHtml += '<div class="center-content" style="gap:48px">';
    statsHtml += '<h2>Room at a Glance</h2>';
    statsHtml += '<div style="display:flex;gap:40px;flex-wrap:wrap;justify-content:center">';
    var statItems = [
      { val: stats.artifacts, label: 'Artifacts', color: '--yellow' },
      { val: stats.meetings, label: 'Meetings', color: '--blue' },
      { val: stats.speakers, label: 'Speakers', color: '--green' },
      { val: stats.sections, label: 'Sections', color: '--sienna' }
    ];
    if (ROOM_DATA.kuzu && ROOM_DATA.kuzu.edges) {
      statItems.push({ val: ROOM_DATA.kuzu.edges, label: 'Connections', color: '--purple' });
    }
    statItems.forEach(function(s) {
      if (!s.val && s.val !== 0) return;
      statsHtml += '<div class="stat-block" style="min-width:180px">';
      statsHtml += '<span class="value" style="color:var(' + s.color + ')" data-count="' + s.val + '">0</span>';
      statsHtml += '<span class="label">' + s.label + '</span>';
      statsHtml += '</div>';
    });
    statsHtml += '</div></div>';
    addSlide('stats', statsHtml);
  }

  // 5. Intelligence slide
  var hasIntel = (intelligence.gaps && intelligence.gaps.length)
    || (intelligence.convergence && intelligence.convergence.length)
    || (intelligence.contradictions && intelligence.contradictions.length);
  if (hasIntel) {
    var intelHtml = logoSvg();
    intelHtml += '<span class="section-label">Intelligence</span>';
    intelHtml += '<div class="stack" style="height:100%;justify-content:center">';
    intelHtml += '<h2>Intelligence Signals</h2>';
    if (intelligence.gaps && intelligence.gaps.length) {
      intelHtml += '<h3 style="font-size:1.4vw;color:var(--red)">Gaps (' + intelligence.gaps.length + ')</h3>';
      intelligence.gaps.slice(0, 4).forEach(function(g) {
        intelHtml += '<div class="intel-item" style="border-left-color:var(--red)">' + esc(typeof g === 'string' ? g : g.description || g.title || JSON.stringify(g)) + '</div>';
      });
    }
    if (intelligence.convergence && intelligence.convergence.length) {
      intelHtml += '<h3 style="font-size:1.4vw;color:var(--green);margin-top:16px">Convergence (' + intelligence.convergence.length + ')</h3>';
      intelligence.convergence.slice(0, 4).forEach(function(c) {
        intelHtml += '<div class="intel-item" style="border-left-color:var(--green)">' + esc(typeof c === 'string' ? c : c.description || c.title || JSON.stringify(c)) + '</div>';
      });
    }
    if (intelligence.contradictions && intelligence.contradictions.length) {
      intelHtml += '<h3 style="font-size:1.4vw;color:var(--yellow);margin-top:16px">Contradictions (' + intelligence.contradictions.length + ')</h3>';
      intelligence.contradictions.slice(0, 4).forEach(function(c) {
        intelHtml += '<div class="intel-item" style="border-left-color:var(--yellow)">' + esc(typeof c === 'string' ? c : c.description || c.title || JSON.stringify(c)) + '</div>';
      });
    }
    intelHtml += '</div>';
    addSlide('content', intelHtml);
  }

  // 6. Opportunities slide
  if (opportunities.length > 0) {
    var oppHtml = logoSvg();
    oppHtml += '<span class="section-label">Opportunities</span>';
    oppHtml += '<div class="center-content" style="gap:32px">';
    oppHtml += '<h2>Opportunities</h2>';
    oppHtml += '<div class="opp-grid">';
    opportunities.slice(0, 6).forEach(function(opp) {
      oppHtml += '<div class="opp-card">';
      oppHtml += '<h4>' + esc(opp.title || 'Opportunity') + '</h4>';
      if (opp.status) oppHtml += '<span class="tag" style="background:var(--teal);color:#fff;font-size:0.7vw;margin-bottom:8px">' + esc(opp.status) + '</span>';
      if (opp.content) oppHtml += '<p>' + esc(opp.content.substring(0, 120)) + (opp.content.length > 120 ? '...' : '') + '</p>';
      oppHtml += '</div>';
    });
    oppHtml += '</div></div>';
    addSlide('content', oppHtml);
  }

  // 7. Closing slide
  addSlide('closing',
    '<div class="center-content" style="gap:48px">' + logoSvg()
    + '<h1 style="font-size:5vw">' + esc(roomName) + '</h1>'
    + '<p style="font-size:1.2vw;color:var(--text-muted);max-width:500px">Explore more in the full data room</p>'
    + '<div style="display:flex;gap:24px;margin-top:16px">'
    + '<a href="index.html" style="color:var(--yellow);font-family:\'JetBrains Mono\',monospace;font-size:0.9vw;text-decoration:none;border:1px solid var(--yellow);padding:8px 20px">Dashboard</a>'
    + '<a href="wiki.html" style="color:var(--blue);font-family:\'JetBrains Mono\',monospace;font-size:0.9vw;text-decoration:none;border:1px solid var(--blue);padding:8px 20px">Wiki</a>'
    + '<a href="insights.html" style="color:var(--green);font-family:\'JetBrains Mono\',monospace;font-size:0.9vw;text-decoration:none;border:1px solid var(--green);padding:8px 20px">Insights</a>'
    + '<a href="graph.html" style="color:var(--purple);font-family:\'JetBrains Mono\',monospace;font-size:0.9vw;text-decoration:none;border:1px solid var(--purple);padding:8px 20px">Graph</a>'
    + '</div>'
    + '<p style="font-size:0.85vw;color:var(--text-muted);margin-top:48px;letter-spacing:0.1em;font-family:\'JetBrains Mono\',monospace">BUILT WITH MINDRIANOS</p>'
    + '</div>'
  );

  // --- Render slides into DOM ---
  slides.forEach(function(s, i) {
    var div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.setAttribute('data-type', s.type);
    div.innerHTML = s.html;
    deck.appendChild(div);
  });

  totalEl.textContent = slides.length;

  // --- Build nav dots ---
  slides.forEach(function(s, i) {
    var dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.onclick = function() { goTo(i); };
    navDotsEl.appendChild(dot);
  });

  // --- Navigation ---
  var currentSlide = 0;
  var isOverview = false;
  var slideEls = deck.querySelectorAll('.slide');
  var dotEls = navDotsEl.querySelectorAll('.nav-dot');

  function goTo(n) {
    if (n < 0 || n >= slides.length || n === currentSlide) return;
    var direction = n > currentSlide ? 1 : -1;

    // Outgoing slide
    slideEls[currentSlide].classList.remove('active');
    slideEls[currentSlide].classList.add(direction > 0 ? 'prev' : '');
    setTimeout(function() { slideEls[currentSlide === 0 ? 0 : currentSlide].classList.remove('prev'); }, 400);

    dotEls[currentSlide].classList.remove('active');

    var prevSlide = currentSlide;
    currentSlide = n;

    // Incoming slide
    slideEls[currentSlide].classList.add('active');
    dotEls[currentSlide].classList.add('active');
    currentEl.textContent = currentSlide + 1;

    // Progress bar
    var pct = ((currentSlide + 1) / slides.length * 100);
    progressBar.style.width = pct + '%';

    // Animate counters on stats slide
    if (slideEls[currentSlide].getAttribute('data-type') === 'stats') {
      animateCounters(slideEls[currentSlide]);
    }

    // Clean up previous
    setTimeout(function() {
      slideEls[prevSlide].classList.remove('prev');
    }, 450);
  }

  // Keyboard nav
  document.addEventListener('keydown', function(e) {
    if (isOverview && e.key === 'Escape') {
      toggleOverview();
      return;
    }
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      goTo(currentSlide + 1);
    }
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      goTo(currentSlide - 1);
    }
    if (e.key === 'Home') { e.preventDefault(); goTo(0); }
    if (e.key === 'End') { e.preventDefault(); goTo(slides.length - 1); }
    if (e.key === 'Escape') {
      e.preventDefault();
      toggleOverview();
    }
  });

  // Touch support
  var touchStartX = 0;
  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
  });
  document.addEventListener('touchend', function(e) {
    var diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) goTo(currentSlide + 1);
      else goTo(currentSlide - 1);
    }
  });

  // Click nav (left/right halves)
  deck.addEventListener('click', function(e) {
    if (isOverview) return;
    if (e.target.closest('a') || e.target.closest('button')) return;
    var x = e.clientX;
    if (x < window.innerWidth / 2) goTo(currentSlide - 1);
    else goTo(currentSlide + 1);
  });

  // Overview mode (Escape toggle)
  function toggleOverview() {
    isOverview = !isOverview;
    document.body.classList.toggle('overview-mode', isOverview);
    if (isOverview) {
      // Make all slides visible
      slideEls.forEach(function(s) {
        s.style.display = 'flex';
        s.style.opacity = '1';
      });
    } else {
      // Restore normal view
      slideEls.forEach(function(s, i) {
        s.style.display = '';
        s.style.opacity = '';
        if (i !== currentSlide) {
          s.classList.remove('active', 'prev');
        }
      });
      slideEls[currentSlide].classList.add('active');
    }
  }

  // --- Animate stat counters ---
  function animateCounters(slideEl) {
    var counters = slideEl.querySelectorAll('[data-count]');
    counters.forEach(function(el) {
      var target = parseInt(el.getAttribute('data-count'), 10);
      if (isNaN(target)) return;
      var duration = 1200;
      var start = 0;
      var startTime = null;
      function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min((timestamp - startTime) / duration, 1);
        // Ease out
        var eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target);
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    });
  }

  // --- Helpers ---
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- Init progress bar ---
  progressBar.style.width = (1 / slides.length * 100) + '%';

})();
</script>
</body>
</html>
