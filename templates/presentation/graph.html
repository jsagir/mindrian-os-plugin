<script>
(function() {
  var D = ROOM_DATA;
  var container = document.getElementById('graph-container');

  if (!container || !D.graph || typeof CanvasGraph !== 'function') {
    if (container) {
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">No graph data available</div>';
    }
    return;
  }

  // Initialize detail panel
  if (typeof GraphDetailPanel !== 'undefined') {
    GraphDetailPanel.init(document.body);
  }

  // Create full-viewport graph
  var graph = new CanvasGraph(container, D.graph, {
    onNodeClick: function(nodeData) {
      if (typeof GraphDetailPanel !== 'undefined') {
        var allEdges = (D.graph.elements && D.graph.elements.edges) || [];
        GraphDetailPanel.show(nodeData, allEdges);
      }
    }
  });

  // Expose graph for chat tool calls
  window.__mosGraph = graph;

  // Expose GenerativeTools globally for chat panel
  window.__mosTools = typeof GenerativeTools !== 'undefined' ? GenerativeTools : null;
})();

// -- Chat Panel initialization --
(function() {
  var D = ROOM_DATA;
  if (typeof ChatPanel === 'undefined') return;
  var chatContainer = document.createElement('div');
  chatContainer.id = 'chat-container';
  document.body.appendChild(chatContainer);
  var panel = new ChatPanel(chatContainer, {
    roomData: D,
    onToolCall: function(name, args) {
      if (typeof GenerativeTools !== 'undefined') {
        return GenerativeTools.executeToolCall(name, args, {
          graph: window.__mosGraph,
          roomData: D,
          chatPanel: panel
        });
      }
      // Fallback: direct highlightCluster for backward compat
      if (name === 'highlightCluster' && window.__mosGraph) {
        window.__mosGraph.highlightCluster(args.group);
        return { success: true };
      }
      return { success: false, message: 'Tool not available' };
    }
  });
  window.__mosChatPanel = panel;
})();

function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme');
  html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}
</script>
