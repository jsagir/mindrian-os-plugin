services:
  - type: web
    name: mindrian-brain
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.cjs
    rootDir: mcp-server-brain
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: pws-brain
      - key: BRAIN_API_KEYS
        sync: false
      - key: SUPABASE_URL
        value: https://ulmymxxmvsehjiyymqoi.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
    autoDeploy: true
