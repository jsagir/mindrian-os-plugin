<style>
/* ============================================
   DE STIJL DESIGN SYSTEM
   ============================================ */
:root {
  --mondrian-red: #C23B22;
  --mondrian-blue: #1B3B6F;
  --mondrian-yellow: #E8B931;
  --mondrian-black: #1A1A1A;
  --mondrian-white: #F7F3ED;
  --mondrian-gray: #D4CFC7;
  --accent-green: #2D6B4A;
  --accent-sienna: #B5602A;
  --grid-border: 5px solid var(--mondrian-black);
  --grid-border-thin: 3px solid var(--mondrian-black);
}

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--mondrian-black);
  color: var(--mondrian-black);
  font-family: "Source Serif 4", Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============================================
   TOP BAR
   ============================================ */
.topbar {
  height: 56px;
  background: var(--mondrian-black);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: var(--grid-border);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  flex-shrink: 0;
}

.topbar-logo-block {
  width: 8px;
  height: 24px;
}

.topbar-logo-block.r { background: var(--mondrian-red); }
.topbar-logo-block.b { background: var(--mondrian-blue); }
.topbar-logo-block.y { background: var(--mondrian-yellow); }

.topbar-title {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--mondrian-white);
}

.topbar-badge {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mondrian-black);
  background: var(--mondrian-yellow);
  padding: 4px 14px;
  display: inline-block;
}

.topbar-nav {
  display: flex;
  gap: 0;
}

.topbar-nav button {
  font-family: "DM Sans", sans-serif;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mondrian-gray);
  background: transparent;
  border: none;
  padding: 8px 18px;
  cursor: pointer;
  transition: color 0.2s ease, background 0.2s ease;
  position: relative;
}

.topbar-nav button:hover {
  color: var(--mondrian-white);
}

.topbar-nav button.active {
  color: var(--mondrian-white);
  background: rgba(255,255,255,0.08);
}

.topbar-nav button.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 3px;
  background: var(--mondrian-yellow);
}

/* ============================================
   UPDATE NOTIFICATION STRIP
   ============================================ */
.update-strip {
  height: 32px;
  background: var(--mondrian-yellow);
  color: var(--mondrian-black);
  font-family: "DM Sans", sans-serif;
  font-size: 11px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0 24px;
}

.update-strip.hidden {
  display: none;
}

.update-strip-dismiss {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 14px;
  color: var(--mondrian-black);
  opacity: 0.6;
  padding: 0 4px;
  line-height: 1;
}

.update-strip-dismiss:hover {
  opacity: 1;
}

/* ============================================
   VIEW CONTAINERS
   ============================================ */
.view {
  display: none;
  min-height: calc(100vh - 56px);
}

.view.active {
  display: block;
}

/* ============================================
   MONDRIAN GRID -- THE PAINTING
   ============================================ */
.mondrian-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  grid-template-rows: 260px 200px 180px 160px;
  gap: 0;
  border: var(--grid-border);
  background: var(--mondrian-black);
  margin: 0;
  min-height: calc(100vh - 56px);
}

.mondrian-cell {
  border: var(--grid-border);
  padding: 28px 24px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  opacity: 0;
  animation: cellAssemble 0.6s ease forwards;
}

.mondrian-cell:hover {
  transform: scale(1.02);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  z-index: 10;
}

@keyframes cellAssemble {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* Cell typography */
.cell-section-label {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.cell-title {
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 700;
  font-size: 20px;
  line-height: 1.25;
}

.cell-summary {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 13px;
  line-height: 1.5;
  margin-top: 8px;
  opacity: 0.85;
}

.cell-meta {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  letter-spacing: 0.05em;
  margin-top: auto;
  opacity: 0.6;
}

/* Artifact count badge */
.cell-count {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  position: absolute;
  top: 12px;
  right: 14px;
  opacity: 0.5;
}

/* Light text for dark bg cells */
.mondrian-cell.dark-bg {
  color: var(--mondrian-white);
}

.mondrian-cell.dark-bg .cell-section-label {
  color: rgba(247,243,237,0.7);
}

/* Dark text for light bg cells */
.mondrian-cell.light-bg {
  color: var(--mondrian-black);
}

.mondrian-cell.light-bg .cell-section-label {
  color: rgba(26,26,26,0.5);
}

/* Stage cell special */
.cell-stage {
  cursor: default;
  justify-content: center;
  align-items: center;
}

.cell-stage:hover {
  transform: none;
  box-shadow: none;
}

.cell-stage .stage-label {
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 800;
  font-size: 42px;
  color: var(--mondrian-black);
  text-align: center;
}

.cell-stage .stage-sub {
  font-family: "DM Sans", sans-serif;
  font-weight: 500;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(26,26,26,0.5);
  text-align: center;
  margin-top: 4px;
}

/* ============================================
   DOCUMENT VIEW
   ============================================ */
.doc-view {
  display: flex;
  min-height: calc(100vh - 56px);
  background: var(--mondrian-white);
}

.doc-rail {
  width: 200px;
  min-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  flex-shrink: 0;
  transition: background 0.5s ease;
}

.doc-rail-label {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.9);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
}

.doc-rail-back {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: "DM Sans", sans-serif;
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  background: transparent;
  border: 2px solid rgba(255,255,255,0.3);
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.doc-rail-back:hover {
  color: #fff;
  border-color: rgba(255,255,255,0.7);
}

.doc-rail.light-rail .doc-rail-label {
  color: rgba(26,26,26,0.8);
}

.doc-rail.light-rail .doc-rail-back {
  color: rgba(26,26,26,0.6);
  border-color: rgba(26,26,26,0.3);
}

.doc-rail.light-rail .doc-rail-back:hover {
  color: var(--mondrian-black);
  border-color: rgba(26,26,26,0.6);
}

/* Document sidebar navigation */
.doc-sidebar-nav {
  width: 240px;
  border-left: var(--grid-border);
  padding: 16px 0;
  flex-shrink: 0;
  overflow-y: auto;
  max-height: calc(100vh - 56px);
  position: sticky;
  top: 56px;
  align-self: flex-start;
  background: var(--mondrian-white);
}

.doc-sidebar-nav-title {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(26,26,26,0.4);
  padding: 4px 16px;
  margin-bottom: 8px;
}

.doc-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  color: rgba(26,26,26,0.6);
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  text-decoration: none;
}

.doc-nav-item:hover {
  background: rgba(26,26,26,0.04);
  color: var(--mondrian-black);
}

.doc-nav-item.active {
  background: rgba(26,26,26,0.04);
  color: var(--mondrian-black);
}

.doc-nav-dot {
  width: 8px;
  height: 8px;
  flex-shrink: 0;
}

.doc-nav-count {
  margin-left: auto;
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  color: rgba(26,26,26,0.35);
}

.doc-content {
  flex: 1;
  padding: 48px 56px 80px 56px;
  max-width: 820px;
  overflow-y: auto;
  border-left: var(--grid-border);
}

.doc-toc {
  width: 220px;
  padding: 48px 20px;
  border-left: var(--grid-border-thin);
  flex-shrink: 0;
  position: sticky;
  top: 56px;
  align-self: flex-start;
  max-height: calc(100vh - 56px);
  overflow-y: auto;
}

.doc-toc-title {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(26,26,26,0.4);
  margin-bottom: 16px;
}

.doc-toc a {
  display: block;
  font-family: "DM Sans", sans-serif;
  font-size: 12px;
  color: rgba(26,26,26,0.6);
  text-decoration: none;
  padding: 5px 0;
  line-height: 1.4;
  transition: color 0.2s ease;
}

.doc-toc a:hover {
  color: var(--mondrian-black);
}

.doc-toc a.toc-h3 {
  padding-left: 14px;
  font-size: 11px;
}

/* Frontmatter infobox */
.frontmatter-box {
  border-top: 4px solid var(--mondrian-black);
  background: rgba(26,26,26,0.03);
  padding: 16px 20px;
  margin-bottom: 32px;
  font-family: "JetBrains Mono", monospace;
  font-size: 12px;
  line-height: 1.7;
  color: rgba(26,26,26,0.6);
}

.frontmatter-box strong {
  color: var(--mondrian-black);
}

/* Markdown rendered content */
.doc-body h1 {
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 700;
  font-size: 32px;
  line-height: 1.2;
  margin-bottom: 24px;
  color: var(--mondrian-black);
  border-bottom: 3px solid var(--mondrian-black);
  padding-bottom: 16px;
}

.doc-body h2 {
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 600;
  font-size: 22px;
  margin-top: 40px;
  margin-bottom: 16px;
  color: var(--mondrian-black);
}

.doc-body h3 {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.04em;
  margin-top: 28px;
  margin-bottom: 12px;
  color: var(--mondrian-black);
}

.doc-body h4 {
  font-family: "DM Sans", sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
  margin-top: 20px;
  margin-bottom: 8px;
}

.doc-body p {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 15px;
  line-height: 1.75;
  margin-bottom: 14px;
  color: rgba(26,26,26,0.85);
}

.doc-body ul, .doc-body ol {
  margin-bottom: 14px;
  padding-left: 24px;
}

.doc-body li {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 6px;
  color: rgba(26,26,26,0.85);
}

.doc-body strong {
  font-weight: 600;
  color: var(--mondrian-black);
}

.doc-body blockquote {
  border-left: 4px solid var(--mondrian-yellow);
  padding: 12px 20px;
  margin: 20px 0;
  background: rgba(232,185,49,0.06);
  font-style: italic;
}

.doc-body blockquote p {
  margin-bottom: 0;
}

.doc-body code {
  font-family: "JetBrains Mono", monospace;
  font-size: 13px;
  background: rgba(26,26,26,0.06);
  padding: 2px 6px;
}

.doc-body pre {
  background: var(--mondrian-black);
  color: var(--mondrian-white);
  padding: 20px 24px;
  margin: 16px 0;
  overflow-x: auto;
  font-family: "JetBrains Mono", monospace;
  font-size: 13px;
  line-height: 1.6;
}

.doc-body pre code {
  background: transparent;
  padding: 0;
  color: inherit;
}

.doc-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 13px;
}

.doc-body th {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: left;
  padding: 10px 12px;
  border-bottom: 3px solid var(--mondrian-black);
  color: var(--mondrian-black);
}

.doc-body td {
  font-family: "Source Serif 4", Georgia, serif;
  padding: 10px 12px;
  border-bottom: 1px solid var(--mondrian-gray);
  vertical-align: top;
}

.doc-body hr {
  border: none;
  border-top: 2px solid var(--mondrian-black);
  margin: 32px 0;
}

/* ============================================
   INTELLIGENCE VIEW
   ============================================ */
.intel-view {
  background: var(--mondrian-white);
  padding: 48px;
}

.intel-header {
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 700;
  font-size: 28px;
  margin-bottom: 8px;
  color: var(--mondrian-black);
}

.intel-sub {
  font-family: "DM Sans", sans-serif;
  font-size: 13px;
  color: rgba(26,26,26,0.5);
  margin-bottom: 40px;
  letter-spacing: 0.05em;
}

.intel-section {
  margin-bottom: 48px;
}

.intel-section-title {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.intel-badge {
  display: inline-block;
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 3px 10px;
  letter-spacing: 0.05em;
}

.badge-red { background: var(--mondrian-red); color: var(--mondrian-white); }
.badge-yellow { background: var(--mondrian-yellow); color: var(--mondrian-black); }
.badge-green { background: var(--accent-green); color: var(--mondrian-white); }
.badge-blue { background: var(--mondrian-blue); color: var(--mondrian-white); }
.badge-gray { background: var(--mondrian-gray); color: var(--mondrian-black); }

.intel-card {
  border: var(--grid-border-thin);
  padding: 20px 24px;
  margin-bottom: 12px;
  background: #fff;
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.intel-card-section {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  font-weight: 500;
  min-width: 160px;
  color: rgba(26,26,26,0.6);
}

.intel-card-message {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--mondrian-black);
}

.intel-card-confidence {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  margin-left: auto;
  flex-shrink: 0;
  padding: 2px 8px;
}

.intel-empty {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 15px;
  color: rgba(26,26,26,0.5);
  font-style: italic;
  padding: 32px 0;
}

/* Validation table */
.validation-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 16px;
}

.validation-table th {
  font-family: "DM Sans", sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: left;
  padding: 12px 14px;
  border-bottom: 3px solid var(--mondrian-black);
  background: var(--mondrian-black);
  color: var(--mondrian-white);
}

.validation-table td {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 13px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--mondrian-gray);
  vertical-align: top;
}

.validation-table tr:hover td {
  background: rgba(26,26,26,0.02);
}

.status-confirmed { color: var(--accent-green); font-weight: 600; }
.status-partial { color: var(--accent-sienna); font-weight: 600; }
.status-unverified { color: var(--mondrian-red); font-weight: 600; }

/* ============================================
   GRAPH VIEW
   ============================================ */
.graph-view {
  display: flex;
  background: var(--mondrian-white);
  min-height: calc(100vh - 56px);
}

.graph-container {
  flex: 1;
  background: #fff;
  border: var(--grid-border);
  position: relative;
}

#cy {
  width: 100%;
  height: calc(100vh - 56px);
}

.graph-overlay {
  position: absolute;
  bottom: 16px;
  right: 16px;
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  color: rgba(26,26,26,0.35);
  letter-spacing: 0.05em;
  text-align: right;
  pointer-events: none;
}

.graph-detail-panel {
  position: absolute;
  top: 0;
  right: 0;
  width: 320px;
  height: 100%;
  background: var(--mondrian-white);
  border-left: var(--grid-border);
  padding: 24px;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s ease;
  z-index: 50;
}

.graph-detail-panel.open {
  transform: translateX(0);
}

.graph-detail-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: transparent;
  border: 2px solid var(--mondrian-black);
  color: var(--mondrian-black);
  width: 28px;
  height: 28px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.graph-detail-title {
  font-family: "Playfair Display", Georgia, serif;
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 12px;
  padding-right: 36px;
}

.graph-detail-type {
  font-family: "DM Sans", sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 16px;
  color: rgba(26,26,26,0.5);
}

.graph-detail-content {
  font-family: "Source Serif 4", Georgia, serif;
  font-size: 14px;
  line-height: 1.6;

<!-- ========================================

<script>
/* ============================================
   ROOM DATA (replaced by generate-export script)
   ============================================ */
var ROOM_DATA = /*ROOM_DATA_PLACEHOLDER*/{"roomName":"Sample Room","stage":"Discovery","generatedDate":"2026-01-01","updates":[],"sections":[],"intelligence":{"gaps":[],"convergence":[],"contradictions":[]},"graph":{"elements":{"nodes":[],"edges":[]}},"stats":{"artifacts":0,"meetings":0,"speakers":0,"sections":0,"empty":0}};

/* ============================================
   SECTION COLOR MAP
   ============================================ */
var SECTION_COLORS = {
  'problem-definition': '#C23B22',
  'solution-design': '#1B3B6F',
  'market-analysis': '#F7F3ED',
  'business-model': '#2D6B4A',
  'competitive-analysis': '#F7F3ED',
  'team-execution': '#F7F3ED',
  'meeting': '#D4CFC7',
  'personas': '#C23B22',
  'legal-ip': '#F7F3ED',
  'financial-model': '#F7F3ED',
  'opportunities': '#B5602A',
  'funding': '#1B3B6F'
};

var DARK_BG_SECTIONS = ['problem-definition', 'solution-design', 'business-model', 'personas', 'funding'];

var SECTION_LABELS = {
  'problem-definition': 'Problem Definition',
  'solution-design': 'Solution Design',
  'market-analysis': 'Market Analysis',
  'business-model': 'Business Model',
  'competitive-analysis': 'Competitive Analysis',
  'team-execution': 'Team & Execution',
  'meeting': 'Meetings',
  'personas': 'Thinking Hats',
  'legal-ip': 'Legal & IP',
  'financial-model': 'Financial Model',
  'opportunities': 'Opportunities',
  'funding': 'Funding'
};

/* Grid layout configurations per cell index for Mondrian asymmetry */
var GRID_LAYOUTS = [
  { col: '1 / 2', row: '1 / 3' },     /* 0: large left — spans 2 rows */
  { col: '2 / 4', row: '1 / 2' },     /* 1: wide top right */
  { col: '2 / 3', row: '2 / 3' },     /* 2: small middle */
  /* slot 3 reserved for stage badge: col 3/4, row 2/3 */
  { col: '1 / 2', row: '3 / 4' },     /* 3: left middle */
  { col: '2 / 4', row: '3 / 4' },     /* 4: wide right middle */
  { col: '1 / 2', row: '4 / 5' },     /* 5: bottom left */
  { col: '2 / 3', row: '4 / 5' },     /* 6: bottom center */
  { col: '3 / 4', row: '4 / 5' },     /* 7: bottom right */
  /* Extra rows for additional sections */
  { col: '1 / 2', row: '5 / 6' },     /* 8 */
  { col: '2 / 3', row: '5 / 6' },     /* 9 */
  { col: '3 / 4', row: '5 / 6' },     /* 10 */
  { col: '1 / 3', row: '6 / 7' },     /* 11 */
  { col: '3 / 4', row: '6 / 7' },     /* 12 */
];

/* ============================================
   INITIALIZE
   ============================================ */
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('topbar-room-name').textContent = ROOM_DATA.roomName || 'Data Room';
  document.getElementById('topbar-stage-badge').textContent = ROOM_DATA.stage || 'Discovery';
  document.getElementById('footer-date').textContent = ROOM_DATA.generatedDate || new Date().toISOString().split('T')[0];

  initUpdateStrip();
  buildGrid();
  buildSidebarNav();
  buildIntelligence();
  buildGraphSidebar();

  mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
});

/* ============================================
   UPDATE STRIP
   ============================================ */
function initUpdateStrip() {
  var updates = ROOM_DATA.updates || [];
  if (updates.length === 0) return;
  var dismissed = localStorage.getItem('mos-update-dismissed');
  var latest = updates[updates.length - 1];
  if (dismissed === latest) return;
  var strip = document.getElementById('update-strip');
  document.getElementById('update-strip-message').textContent = latest;
  strip.classList.remove('hidden');
}

function dismissUpdate() {
  var updates = ROOM_DATA.updates || [];
  if (updates.length > 0) {
    localStorage.setItem('mos-update-dismissed', updates[updates.length - 1]);
  }
  document.getElementById('update-strip').classList.add('hidden');
}

/* ============================================
   BUILD MONDRIAN GRID
   ============================================ */
function buildGrid() {
  var grid = document.getElementById('mondrian-grid');
  grid.innerHTML = '';
  var sections = ROOM_DATA.sections || [];

  if (sections.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;padding:80px;text-align:center;color:var(--mondrian-white);font-family:Playfair Display,serif;font-size:24px;">No sections in this room yet.</div>';
    return;
  }

  /* Adjust grid rows based on section count */
  var totalSlots = sections.length + 1; /* +1 for stage badge */
  var rowCount = Math.max(4, Math.ceil((totalSlots + 2) / 3) + 1);
  var rowSizes = ['260px', '200px', '180px', '160px'];
  while (rowSizes.length < rowCount) rowSizes.push('160px');
  grid.style.gridTemplateRows = rowSizes.join(' ');

  var layoutIndex = 0;
  var stagePlaced = false;

  sections.forEach(function(section, i) {
    var cell = document.createElement('div');
    cell.className = 'mondrian-cell';
    var sectionColor = section.color || SECTION_COLORS[section.id] || '#F7F3ED';
    cell.style.background = sectionColor;
    cell.style.animationDelay = (i * 50) + 'ms';

    /* Determine light/dark text */
    var isDark = section.lightText || DARK_BG_SECTIONS.indexOf(section.id) >= 0;
    cell.classList.add(isDark ? 'dark-bg' : 'light-bg');

    /* Grid position */
    var layout = GRID_LAYOUTS[layoutIndex] || { col: ((layoutIndex % 3) + 1) + ' / ' + ((layoutIndex % 3) + 2), row: 'auto' };
    cell.style.gridColumn = layout.col;
    cell.style.gridRow = layout.row;
    layoutIndex++;

    /* Insert stage badge after position 2 (index 3 in layout) */
    if (layoutIndex === 3 && !stagePlaced) {
      var stageCell = document.createElement('div');
      stageCell.className = 'mondrian-cell cell-stage';
      stageCell.style.background = 'var(--mondrian-yellow)';
      stageCell.style.gridColumn = '3 / 4';
      stageCell.style.gridRow = '2 / 3';
      stageCell.style.animationDelay = '100ms';
      stageCell.innerHTML = '<div class="stage-label">' + escHtml(ROOM_DATA.stage || 'Discovery') + '</div><div class="stage-sub">Venture Stage</div>';
      grid.appendChild(stageCell);
      stagePlaced = true;
    }

    /* Cell content */
    cell.setAttribute('data-section', section.id);
    cell.onclick = function() { openDoc(section.id); };

    var countText = section.entryCount === 1 ? '1 artifact' : (section.entryCount || 0) + ' artifacts';
    cell.innerHTML =
      '<span class="cell-count">' + escHtml(countText) + '</span>' +
      '<div class="cell-section-label">' + escHtml(section.label || SECTION_LABELS[section.id] || section.id) + '</div>' +
      '<div class="cell-title">' + escHtml(section.summary || section.label || section.id) + '</div>';

    grid.appendChild(cell);
  });

  /* Add stage badge if we had fewer than 3 sections */
  if (!stagePlaced) {
    var stageCell = document.createElement('div');
    stageCell.className = 'mondrian-cell cell-stage';
    stageCell.style.background = 'var(--mondrian-yellow)';
    stageCell.style.gridColumn = '3 / 4';
    stageCell.style.gridRow = '1 / 2';
    stageCell.style.animationDelay = '100ms';
    stageCell.innerHTML = '<div class="stage-label">' + escHtml(ROOM_DATA.stage || 'Discovery') + '</div><div class="stage-sub">Venture Stage</div>';
    grid.appendChild(stageCell);
  }
}

/* ============================================
   SIDEBAR NAVIGATION (Document View)
   ============================================ */
function buildSidebarNav() {
  var container = document.getElementById('doc-sidebar-nav');
  var sections = ROOM_DATA.sections || [];

  sections.forEach(function(section) {
    var item = document.createElement('a');
    item.className = 'doc-nav-item';
    item.setAttribute('data-section', section.id);
    item.onclick = function() { openDoc(section.id); };

    var dotColor = section.color || SECTION_COLORS[section.id] || '#D4CFC7';
    var count = section.entryCount || 0;

    item.innerHTML =
      '<div class="doc-nav-dot" style="background:' + dotColor + ';"></div>' +
      '<span>' + escHtml(section.label || SECTION_LABELS[section.id] || section.id) + '</span>' +
      '<span class="doc-nav-count">' + count + '</span>';

    container.appendChild(item);
  });
}

/* ============================================
   VIEW SWITCHING
   ============================================ */
function switchView(view) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.topbar-nav button').forEach(function(b) { b.classList.remove('active'); });

  if (view === 'overview') {
    document.getElementById('view-overview').classList.add('active');
  } else if (view === 'intelligence') {
    document.getElementById('view-intelligence').classList.add('active');
  } else if (view === 'graph') {
    document.getElementById('view-graph').classList.add('active');
    initGraph();
  }

  var btn = document.querySelector('.topbar-nav button[data-view="' + view + '"]');
  if (btn) btn.classList.add('active');
}

/* ============================================
   DOCUMENT VIEWER
   ============================================ */
function stripFrontmatter(md) {
  var match = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (match) return { frontmatter: match[1], body: match[2] };
  return { frontmatter: null, body: md };
}

function parseFrontmatter(fm) {
  if (!fm) return {};
  var obj = {};
  fm.split('\n').forEach(function(line) {
    var m = line.match(/^(\w[\w-]*):\s*(.+)$/);
    if (m) obj[m[1]] = m[2].replace(/^["']|["']$/g, '');
  });
  return obj;
}

var LIGHT_RAIL_SECTIONS = ['market-analysis', 'competitive-analysis', 'team-execution', 'meeting', 'legal-ip', 'financial-model'];

function openDoc(section) {
  var script = document.getElementById('content-' + section);
  if (!script) {
    /* No content for this section */
    switchView('overview');
    return;
  }

  var raw = script.textContent;
  var parsed = stripFrontmatter(raw);
  var fmData = parseFrontmatter(parsed.frontmatter);

  /* Rail color */
  var rail = document.getElementById('doc-rail');
  var color = SECTION_COLORS[section] || '#1A1A1A';
  /* Find section-specific color from ROOM_DATA */
  var sectionData = (ROOM_DATA.sections || []).find(function(s) { return s.id === section; });
  if (sectionData && sectionData.color) color = sectionData.color;

  rail.style.background = color;
  rail.className = 'doc-rail' + (LIGHT_RAIL_SECTIONS.indexOf(section) >= 0 ? ' light-rail' : '');
  document.getElementById('doc-rail-label').textContent = SECTION_LABELS[section] || (sectionData && sectionData.label) || section;

  /* Frontmatter infobox */
  var fmBox = document.getElementById('doc-frontmatter');
  if (parsed.frontmatter) {
    fmBox.style.borderTopColor = color;
    var html = '';
    for (var k in fmData) {
      if (fmData.hasOwnProperty(k)) html += '<strong>' + escHtml(k) + ':</strong> ' + escHtml(fmData[k]) + '<br>';
    }
    fmBox.innerHTML = html;
    fmBox.style.display = 'block';
  } else {
    fmBox.style.display = 'none';
  }

  /* Render markdown */
  var rendered = marked.parse(parsed.body);
  document.getElementById('doc-body').innerHTML = rendered;

  /* Render mermaid diagrams */
  initMermaid();

  /* Build TOC */
  var tocContainer = document.getElementById('doc-toc-links');
  tocContainer.innerHTML = '';
  var headings = document.getElementById('doc-body').querySelectorAll('h2, h3');
  headings.forEach(function(h, i) {
    var id = 'heading-' + i;
    h.id = id;
    var a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    if (h.tagName === 'H3') a.className = 'toc-h3';
    tocContainer.appendChild(a);
  });

  /* Update sidebar active state */
  document.querySelectorAll('.doc-nav-item').forEach(function(item) {
    item.classList.remove('active');
    if (item.getAttribute('data-section') === section) {
      item.classList.add('active');
      item.style.borderLeftColor = color;
    } else {
      item.style.borderLeftColor = 'transparent';
    }
  });

  /* Switch to document view */
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById('view-document').classList.add('active');
  document.querySelectorAll('.topbar-nav button').forEach(function(b) { b.classList.remove('active'); });

  /* Scroll to top of content */
  document.querySelector('.doc-content').scrollTop = 0;
}

function backToOverview() {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.getElementById('view-overview').classList.add('active');
  document.querySelector('.topbar-nav button[data-view="overview"]').classList.add('active');
}

/* ============================================
   MERMAID RENDERING
   ============================================ */
function initMermaid() {
  var codeBlocks = document.querySelectorAll('.doc-body pre code.language-mermaid');
  codeBlocks.forEach(function(code, i) {
    var pre = code.parentElement;
    var container = document.createElement('div');
    container.className = 'mermaid';
    container.textContent = code.textContent;
    pre.parentElement.replaceChild(container, pre);
  });
  try {
    mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
  } catch(e) { /* mermaid rendering is best-effort */ }
}

/* ============================================
   INTELLIGENCE VIEW
   ============================================ */
function buildIntelligence() {
  var container = document.getElementById('intel-view');
  var intel = ROOM_DATA.intelligence || {};
  var stats = ROOM_DATA.stats || {};

  var html = '';
  html += '<div class="intel-header">Room Intelligence</div>';
  html += '<div class="intel-sub">Cross-section analysis from ' +
    (stats.artifacts || 0) + ' artifacts, ' +
    (stats.meetings || 0) + ' meetings, ' +
    (stats.speakers || 0) + ' speakers</div>';

  var hasData = false;

  /* GAPS */
  var gaps = intel.gaps || [];
  if (gaps.length > 0) {
    hasData = true;
    html += '<div class="intel-section">';
    html += '<div class="intel-section-title"><span class="intel-badge badge-red">GAPS</span> Structural holes in the data room</div>';
    gaps.forEach(function(gap) {
      var badgeClass = gap.severity === 'HIGH' ? 'badge-red' : (gap.severity === 'MEDIUM' ? 'badge-yellow' : 'badge-gray');
      html += '<div class="intel-card">' +
        '<div class="intel-card-section">' + escHtml(gap.section || '') + '</div>' +
        '<div class="intel-card-message">' + escHtml(gap.message || '') + '</div>' +
        '<span class="intel-badge ' + badgeClass + ' intel-card-confidence">' + escHtml(gap.severity || 'LOW') + '</span>' +
        '</div>';
    });
    html += '</div>';
  }

  /* CONVERGENCE */
  var convergence = intel.convergence || [];
  if (convergence.length > 0) {
    hasData = true;
    html += '<div class="intel-section">';
    html += '<div class="intel-section-title"><span class="intel-badge badge-yellow">CONVERGENCE</span> Themes appearing across 3+ sections</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">';
    convergence.forEach(function(theme) {
      html += '<span class="intel-badge badge-yellow">' + escHtml(theme) + '</span>';
    });
    html += '</div></div>';
  }

  /* CONTRADICTIONS */
  var contradictions = intel.contradictions || [];
  if (contradictions.length > 0) {
    hasData = true;
    html += '<div class="intel-section">';
    html += '<div class="intel-section-title"><span class="intel-badge badge-red">CONTRADICTIONS</span> Internal tensions requiring resolution</div>';
    contradictions.forEach(function(c) {
      var badgeClass = c.severity === 'HIGH' ? 'badge-red' : (c.severity === 'MEDIUM' ? 'badge-yellow' : 'badge-gray');
      html += '<div class="intel-card" style="border-left: 4px dashed var(--mondrian-red);">' +
        '<div class="intel-card-section">' + escHtml(c.sections || '') + '</div>' +
        '<div class="intel-card-message">' + escHtml(c.message || '') + '</div>' +
        '<span class="intel-badge ' + badgeClass + ' intel-card-confidence">' + escHtml(c.severity || 'MEDIUM') + '</span>' +
        '</div>';
    });
    html += '</div>';
  }

  if (!hasData) {
    html += '<div class="intel-empty">No intelligence data available. Run /mos:room analyze to generate cross-section insights.</div>';
  }

  container.innerHTML = html;
}

/* ============================================
   GRAPH SIDEBAR (Legend + Stats)
   ============================================ */
function buildGraphSidebar() {
  var container = document.getElementById('graph-sidebar');
  var stats = ROOM_DATA.stats || {};

  var html = '<div class="graph-sidebar-title">Legend</div>';

  /* Section legend items from room data */
  var sections = ROOM_DATA.sections || [];
  sections.forEach(function(s) {
    var color = s.color || SECTION_COLORS[s.id] || '#D4CFC7';
    html += '<div class="legend-item"><div class="legend-dot" style="background:' + color + ';"></div> ' + escHtml(s.label || s.id) + '</div>';
  });

  html += '<div class="legend-item"><div class="legend-dot" style="background:#D4A843;border:2px solid var(--mondrian-black);"></div> Meeting</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:#1E3A6E;border:3px solid var(--mondrian-white);outline:2px solid #1E3A6E;width:12px;height:12px;"></div> Speaker</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--mondrian-yellow);width:10px;height:10px;"></div> Keyword</div>';

  html += '<div style="margin-top:24px;">';
  html += '<div class="graph-sidebar-title">Edge Types</div>';
  html += '<div class="legend-item"><div class="legend-line" style="background:#C8A43C;"></div> Converges</div>';
  html += '<div class="legend-item"><div class="legend-line-dashed" style="border-color:#C23B22;"></div> Contradicts</div>';
  html += '<div class="legend-item"><div class="legend-line" style="background:#2D6B4A;"></div> Reinforces</div>';
  html += '<div class="legend-item"><div class="legend-line" style="background:#5C5A56;"></div> Informs</div>';
  html += '<div class="legend-item"><div class="legend-line" style="background:#D4CFC7;"></div> Filed To / Spoke In</div>';
  html += '</div>';

  html += '<div class="graph-stats">';
  html += '<div class="graph-sidebar-title">Room Stats</div>';
  html += '<div class="graph-stat"><span class="graph-stat-label">Artifacts</span><span class="graph-stat-value">' + (stats.artifacts || 0) + '</span></div>';
  html += '<div class="graph-stat"><span class="graph-stat-label">Meetings</span><span class="graph-stat-value">' + (stats.meetings || 0) + '</span></div>';
  html += '<div class="graph-stat"><span class="graph-stat-label">Speakers</span><span class="graph-stat-value">' + (stats.speakers || 0) + '</span></div>';
  html += '<div class="graph-stat"><span class="graph-stat-label">Sections</span><span class="graph-stat-value">' + (stats.sections || 0) + '</span></div>';
  if (stats.empty > 0) {
    html += '<div class="graph-stat"><span class="graph-stat-label">Empty</span><span class="graph-stat-value" style="color:var(--mondrian-red);">' + stats.empty + '</span></div>';
  }
  html += '</div>';

  container.innerHTML = html;
}

/* ============================================
   KNOWLEDGE GRAPH (Cytoscape.js)
   ============================================ */
var cyInstance = null;
var cyInitialized = false;

function initGraph() {
  if (cyInitialized) return;
  cyInitialized = true;

  var elements = (ROOM_DATA.graph && ROOM_DATA.graph.elements) || { nodes: [], edges: [] };
  var allNodes = elements.nodes || [];
  var allEdges = elements.edges || [];

  if (allNodes.length === 0) {
    document.getElementById('cy').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-family:Source Serif 4,serif;font-size:18px;color:rgba(26,26,26,0.4);font-style:italic;">No graph data available. Build the knowledge graph with /mos:room graph.</div>';
    return;
  }

  /* Graph overlay info */
  document.getElementById('graph-overlay').innerHTML =
    ROOM_DATA.roomName + ' &middot; ' + allNodes.length + ' nodes &middot; ' + allEdges.length + ' edges<br>Powered by MindrianOS';

  var layoutName = allNodes.length < 13 ? 'grid' : 'cose';

  cyInstance = cytoscape({
    container: document.getElementById('cy'),
    elements: elements,
    style: [
      /* Section nodes */
      {
        selector: 'node.section-group',
        style: {
          'background-color': 'data(color)',
          'label': 'data(label)',
          'color': '#F7F3ED',
          'text-valign': 'center',
          'text-halign': 'center',
          'font-family': '"DM Sans", sans-serif',
          'font-size': '10px',
          'font-weight': 700,
          'width': 90,
          'height': 90,
          'text-wrap': 'wrap',
          'text-max-width': '80px',
          'border-width': 4,
          'border-color': '#1A1A1A',
          'shape': 'rectangle',
          'transition-property': 'opacity, width, height',
          'transition-duration': '0.3s'
        }
      },
      /* Artifact nodes */
      {
        selector: 'node.artifact',
        style: {
          'background-color': 'data(color)',
          'background-opacity': 0.6,
          'label': 'data(label)',
          'color': '#1A1A1A',
          'text-valign': 'center',
          'text-halign': 'center',
          'font-family': '"Source Serif 4", serif',
          'font-size': '8px',
          'width': 50,
          'height': 50,
          'text-wrap': 'wrap',
          'text-max-width': '45px',
          'border-width': 2,
          'border-color': '#1A1A1A',
          'shape': 'rectangle',
          'transition-property': 'opacity, width, height',
          'transition-duration': '0.3s'
        }
      },
      /* Meeting nodes */
      {
        selector: 'node.meeting',
        style: {
          'background-color': '#D4A843',
          'label': 'data(label)',
          'shape': 'diamond',
          'width': 60,
          'height': 60,
          'color': '#1A1A1A',
          'font-family': '"DM Sans", sans-serif',
          'font-size': '9px',
          'font-weight': 600,
          'text-valign': 'center',
          'text-halign': 'center',
          'text-wrap': 'wrap',
          'text-max-width': '55px',
          'border-width': 4,
          'border-color': '#1A1A1A',
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* Speaker nodes */
      {
        selector: 'node.speaker',
        style: {
          'background-color': '#1E3A6E',
          'label': 'data(label)',
          'shape': 'ellipse',
          'width': 50,
          'height': 50,
          'color': '#F7F3ED',
          'font-family': '"DM Sans", sans-serif',
          'font-size': '8px',
          'font-weight': 500,
          'text-valign': 'center',
          'text-halign': 'center',
          'text-wrap': 'wrap',
          'text-max-width': '45px',
          'border-width': 3,
          'border-color': '#F7F3ED',
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* Keyword/concept nodes */
      {
        selector: 'node.keyword',
        style: {
          'background-color': '#C8A43C',
          'label': 'data(label)',
          'shape': 'ellipse',
          'width': 30,
          'height': 30,
          'color': '#1A1A1A',
          'font-family': '"DM Sans", sans-serif',
          'font-size': '7px',
          'font-weight': 600,
          'text-valign': 'center',
          'text-halign': 'center',
          'border-width': 2,
          'border-color': '#1A1A1A',
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* CONVERGES edges */
      {
        selector: 'edge.converges',
        style: {
          'line-color': '#C8A43C',
          'width': 2.5,
          'curve-style': 'bezier',
          'target-arrow-shape': 'triangle',
          'target-arrow-color': '#C8A43C',
          'opacity': 0.75,
          'label': 'data(label)',
          'font-size': '7px',
          'font-family': '"JetBrains Mono", monospace',
          'color': '#888',
          'text-rotation': 'autorotate',
          'text-margin-y': -8,
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* CONTRADICTS edges */
      {
        selector: 'edge.contradicts',
        style: {
          'line-color': '#C23B22',
          'line-style': 'dashed',
          'width': 2.5,
          'curve-style': 'bezier',
          'opacity': 0.7,
          'label': 'data(label)',
          'font-size': '7px',
          'font-family': '"JetBrains Mono", monospace',
          'color': '#C23B22',
          'text-rotation': 'autorotate',
          'text-margin-y': -8,
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* INFORMS edges */
      {
        selector: 'edge.informs',
        style: {
          'line-color': '#5C5A56',
          'width': 1.5,
          'curve-style': 'bezier',
          'target-arrow-shape': 'triangle',
          'target-arrow-color': '#5C5A56',
          'opacity': 0.5,
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* REINFORCES edges */
      {
        selector: 'edge.reinforces',
        style: {
          'line-color': '#2D6B4A',
          'width': 2,
          'curve-style': 'bezier',
          'target-arrow-shape': 'triangle',
          'target-arrow-color': '#2D6B4A',
          'opacity': 0.65,
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* SPOKE_IN / FILED_TO edges */
      {
        selector: 'edge.spoke-in, edge.filed-to',
        style: {
          'line-color': '#D4CFC7',
          'width': 1,
          'curve-style': 'bezier',
          'line-style': 'dotted',
          'target-arrow-shape': 'triangle',
          'target-arrow-color': '#D4CFC7',
          'opacity': 0.35,
          'transition-property': 'opacity',
          'transition-duration': '0.3s'
        }
      },
      /* Dimmed state */
      {
        selector: '.dimmed',
        style: {
          'opacity': 0.15
        }
      },
      /* Highlighted state */
      {
        selector: '.highlighted',
        style: {
          'opacity': 1
        }
      }
    ],
    layout: layoutName === 'grid' ? {
      name: 'grid',
      padding: 60,
      animate: true,
      animationDuration: 1200,
      animationEasing: 'ease-out-cubic'
    } : {
      name: 'cose',
      padding: 60,
      nodeRepulsion: function() { return 15000; },
      idealEdgeLength: function() { return 140; },
      edgeElasticity: function() { return 80; },
      gravity: 0.25,
      numIter: 1000,
      animate: true,
      animationDuration: 1200
    },
    minZoom: 0.3,
    maxZoom: 3,
    wheelSensitivity: 0.3
  });

  /* Hover: highlight connected, dim rest */
  cyInstance.on('mouseover', 'node', function(evt) {
    var node = evt.target;
    var neighborhood = node.neighborhood().add(node);
    cyInstance.elements().addClass('dimmed');
    neighborhood.removeClass('dimmed').addClass('highlighted');
  });

  cyInstance.on('mouseout', 'node', function() {
    cyInstance.elements().removeClass('dimmed highlighted');
  });

  /* Click section node: open doc */
  cyInstance.on('tap', 'node.section-group', function(evt) {
    var id = evt.target.data('id');
    if (document.getElementById('content-' + id)) openDoc(id);
  });

  /* Click keyword: filter mode */
  cyInstance.on('tap', 'node.keyword', function(evt) {
    var node = evt.target;
    var neighborhood = node.neighborhood().add(node);
    cyInstance.elements().addClass('dimmed');
    neighborhood.removeClass('dimmed').addClass('highlighted');
  });

  /* Click node: open detail panel */
  cyInstance.on('tap', 'node.artifact, node.meeting, node.speaker', function(evt) {
    var node = evt.target;
    var data = node.data();
    document.getElementById('graph-detail-type').textContent = (data.nodeType || node.classes()[0] || 'Node').toUpperCase();
    document.getElementById('graph-detail-title').textContent = data.label || data.id;
    document.getElementById('graph-detail-content').textContent = data.content || data.description || '';
    document.getElementById('graph-detail-panel').classList.add('open');
  });

  /* Click edge: tooltip */
  cyInstance.on('tap', 'edge', function(evt) {
    var edge = evt.target;
    var data = edge.data();
    var src = edge.source().data('label') || edge.source().data('id');
    var tgt = edge.target().data('label') || edge.target().data('id');
    document.getElementById('graph-detail-type').textContent = (data.label || data.edgeType || 'EDGE').toUpperCase();
    document.getElementById('graph-detail-title').textContent = src + ' \u2192 ' + tgt;
    document.getElementById('graph-detail-content').textContent = data.description || '';
    document.getElementById('graph-detail-panel').classList.add('open');
  });

  /* Double-click section: zoom to subgraph */
  cyInstance.on('dbltap', 'node.section-group', function(evt) {
    var node = evt.target;
    var neighborhood = node.neighborhood().add(node);
    cyInstance.animate({
      fit: { eles: neighborhood, padding: 60 },
      duration: 600,
      easing: 'ease-out-cubic'
    });
  });

  /* Click background: reset */
  cyInstance.on('tap', function(evt) {
    if (evt.target === cyInstance) {
      cyInstance.elements().removeClass('dimmed highlighted');
      closeDetailPanel();
      cyInstance.animate({
        fit: { eles: cyInstance.elements(), padding: 60 },
        duration: 600,
        easing: 'ease-out-cubic'
      });
    }
  });
}

function closeDetailPanel() {
  document.getElementById('graph-detail-panel').classList.remove('open');
}

/* ============================================
   UTILITIES
   ============================================ */
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
