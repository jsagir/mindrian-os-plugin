  <style>
    :root {
      --ds-bg: #0D0D0D;
      --ds-surface: #1A1A1A;
      --ds-elevated: #2A2A2A;
      --ds-cream: #F5F0E8;
      --ds-muted: #A09A90;
      --ds-border: #2A2A2A;
      --ds-red: #A63D2F;
      --ds-blue: #1E3A6E;
      --ds-yellow: #C8A43C;
      --ds-green: #2D6B4A;
      --ds-sienna: #B5602A;
      --ds-gray: #5C5A56;
      --ds-amethyst: #6B4E8B;
      --ds-teal: #2A6B5E;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      border-radius: 0;
    }

    body {
      background: var(--ds-bg);
      color: var(--ds-cream);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--ds-surface);
      border-bottom: 1px solid var(--ds-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: var(--ds-cream);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-chip {
      width: 8px;
      height: 8px;
      display: inline-block;
    }

    .legend-label {
      font-size: 11px;
      color: var(--ds-muted);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    .btn-refresh {
      background: var(--ds-elevated);
      color: var(--ds-cream);
      border: 1px solid var(--ds-border);
      padding: 6px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: background 150ms ease;
      border-radius: 0;
    }

    .btn-refresh:hover {
      background: var(--ds-surface);
      border-color: var(--ds-muted);
    }

    /* ── Graph Container ── */
    #cy {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 180px;
      background: var(--ds-bg);
    }

    /* ── Empty State Overlay ── */
    .empty-state {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 180px;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }

    .empty-state.visible {
      display: flex;
    }

    .empty-state-text {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--ds-muted);
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    .empty-state-text code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--ds-cream);
      background: var(--ds-elevated);
      padding: 2px 6px;
    }

    /* ── Detail Panel ── */
    .detail-panel {
      position: fixed;
      top: 48px;
      right: 0;
      width: 300px;
      bottom: 180px;
      background: var(--ds-surface);
      border-left: 1px solid var(--ds-border);
      transform: translateX(100%);
      transition: transform 200ms ease-out;
      z-index: 50;
      overflow-y: auto;
      padding: 16px;
    }

    .detail-panel.open {
      transform: translateX(0);
    }

    .detail-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: var(--ds-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 150ms ease;
    }

    .detail-close:hover {
      color: var(--ds-cream);
    }

    .detail-section-bar {
      width: 100%;
      height: 4px;
      margin-bottom: 16px;
    }

    .detail-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      color: var(--ds-cream);
      margin-bottom: 16px;
      padding-right: 24px;
    }

    .detail-field {
      margin-bottom: 12px;
    }

    .detail-field-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ds-muted);
      margin-bottom: 2px;
    }

    .detail-field-value {
      font-size: 13px;
      color: var(--ds-cream);
    }

    .detail-field-value.mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    /* ── Chat Panel ── */
    .chat-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      background: var(--ds-surface);
      border-top: 1px solid var(--ds-border);
      display: flex;
    }

    .chat-left {
      flex: 7;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      max-height: 120px;
    }

    .chat-msg {
      padding: 6px 8px;
      margin-bottom: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      line-height: 1.5;
    }

    .chat-msg.user {
      color: var(--ds-cream);
      background: var(--ds-bg);
    }

    .chat-msg.bot {
      color: var(--ds-muted);
      background: var(--ds-elevated);
      border-left: 3px solid var(--ds-yellow);
    }

    .chat-msg .confidence-high {
      color: var(--ds-red);
      font-weight: 600;
    }

    .chat-msg .confidence-medium {
      color: var(--ds-yellow);
      font-weight: 600;
    }

    .chat-input-bar {
      display: flex;
      padding: 8px 12px;
      gap: 0;
      border-top: 1px solid rgba(245,240,232,0.1);
    }

    .chat-input {
      flex: 1;
      height: 40px;
      background: var(--ds-elevated);
      color: var(--ds-cream);
      border: 1px solid var(--ds-border);
      border-radius: 0;
      padding: 0 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
    }

    .chat-input::placeholder {
      color: var(--ds-muted);
    }

    .chat-input:focus {
      border-color: var(--ds-muted);
    }

    .chat-send {
      height: 40px;
      padding: 0 16px;
      background: var(--ds-elevated);
      color: var(--ds-cream);
      border: 1px solid var(--ds-border);
      border-left: none;
      border-radius: 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 150ms ease;
    }

    .chat-send:hover {
      background: var(--ds-red);
    }

    .chat-right {
      flex: 3;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      border-left: 1px solid rgba(245,240,232,0.1);
      justify-content: center;
    }

    .chat-quick-btn {
      background: var(--ds-elevated);
      color: var(--ds-cream);
      border: 1px solid var(--ds-border);
      border-radius: 0;
      padding: 8px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      text-align: left;
      transition: background 150ms ease, border-color 150ms ease;
    }

    .chat-quick-btn:hover {
      background: var(--ds-surface);
      border-color: var(--ds-muted);
    }

    /* ── Status Indicators (6px squares) ── */
    .status-indicator {
      width: 6px;
      height: 6px;
      display: inline-block;
    }

    /* ── Layer Toggle Buttons ── */
    .layer-toggles {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-right: 12px;
    }

    .layer-btn {
      background: var(--ds-elevated);
      color: var(--ds-cream);
      border: 1px solid var(--ds-border);
      padding: 4px 10px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }

    .layer-btn.active {
      border-color: var(--ds-cream);
      background: var(--ds-surface);
    }

    .layer-btn:hover {
      border-color: var(--ds-muted);
    }

    /* ── Preset View Buttons ── */
    .preset-views {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-right: 8px;
    }

    .preset-btn {
      background: var(--ds-bg);
      color: var(--ds-muted);
      border: 1px solid var(--ds-border);
      padding: 4px 8px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
    }

    .preset-btn.active {
      background: var(--ds-elevated);
      color: var(--ds-cream);
      border-color: var(--ds-cream);
    }

    .preset-btn:hover {
      border-color: var(--ds-muted);
      color: var(--ds-cream);
    }

    /* ── Timeline Toggle ── */
    .timeline-btn {
      background: var(--ds-elevated);
      color: var(--ds-cream);
      border: 1px solid var(--ds-border);
      padding: 4px 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }

    .timeline-btn.active {
      border-color: var(--ds-yellow);
      background: var(--ds-surface);
      color: var(--ds-yellow);
    }

    .timeline-btn:hover {
      border-color: var(--ds-muted);
    }

    /* ── Edge hover label tooltip ── */
    .edge-tooltip {
      position: absolute;
      background: var(--ds-surface);
      color: var(--ds-cream);
      border: 1px solid var(--ds-border);
      padding: 2px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      pointer-events: none;
      z-index: 60;
      display: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <span class="header-title" id="header-title">Mindrian Data Room</span>
    <div class="header-right">
      <div class="layer-toggles" id="layer-toggles">
        <span style="font-size:10px;color:var(--ds-muted);text-transform:uppercase;letter-spacing:0.06em;">Layers:</span>
        <button class="layer-btn active" data-layer="structure">Structure</button>
        <button class="layer-btn active" data-layer="content">Content</button>
        <button class="layer-btn active" data-layer="intelligence">Intelligence</button>
      </div>
      <div class="preset-views" id="preset-views">
        <button class="preset-btn active" data-preset="room">Room</button>
        <button class="preset-btn" data-preset="meetings">Meetings</button>
        <button class="preset-btn" data-preset="team">Team</button>
        <button class="preset-btn" data-preset="intel">Intel</button>
      </div>
      <button class="timeline-btn" id="btn-timeline">Timeline</button>
      <div class="legend">
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-red)"></span>
          <span class="legend-label">Problem</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-yellow)"></span>
          <span class="legend-label">Market</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-gray)"></span>
          <span class="legend-label">Solution</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-green)"></span>
          <span class="legend-label">Business</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-sienna)"></span>
          <span class="legend-label">Competitive</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-blue)"></span>
          <span class="legend-label">Team</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-amethyst)"></span>
          <span class="legend-label">Legal</span>
        </div>
        <div class="legend-item">
          <span class="legend-chip" style="background: var(--ds-teal)"></span>
          <span class="legend-label">Financial</span>
        </div>
      </div>
      <button class="btn-refresh" id="btn-refresh">Refresh</button>
    </div>
  </div>

  <!-- Graph Container -->
  <div id="cy"></div>

  <!-- Empty State Overlay -->
  <div class="empty-state" id="empty-state">
    <div class="empty-state-text">
      Your Data Room is empty.<br>
      Run <code>/mos:new-project</code> to get started.
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detail-panel">
    <button class="detail-close" id="detail-close">X</button>
    <div class="detail-section-bar" id="detail-section-bar"></div>
    <div class="detail-title" id="detail-title"></div>
    <div id="detail-fields"></div>
  </div>

  <!-- Edge Tooltip -->
  <div class="edge-tooltip" id="edge-tooltip"></div>

  <!-- Chat Intelligence Panel -->
  <div class="chat-panel">
    <div class="chat-left">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-bar">
        <input type="text" class="chat-input" id="chat-input" placeholder="Ask about your room..." />
        <button class="chat-send" id="chat-send">ASK</button>
      </div>
    </div>
    <div class="chat-right">
      <button class="chat-quick-btn" data-query="what gaps do I have?">Gaps</button>
      <button class="chat-quick-btn" data-query="show contradictions">Conflicts</button>
      <button class="chat-quick-btn" data-query="convergence themes">Themes</button>
      <button class="chat-quick-btn" data-query="room overview">Summary</button>
    </div>
  </div>

  <script>
    // ── Section Colors ──
    const SECTION_COLORS = {
      'problem-definition': '#A63D2F',
      'market-analysis': '#C8A43C',
      'solution-design': '#5C5A56',
      'business-model': '#2D6B4A',
      'competitive-analysis': '#B5602A',
      'team-execution': '#1E3A6E',
      'legal-ip': '#6B4E8B',
      'financial-model': '#2A6B5E'
    };

    // ── Cytoscape De Stijl Stylesheet ──
    const graphStyle = [
      // Section group nodes
      {
        selector: 'node.section-group',
        style: {
          'background-color': '#1A1A1A',
          'border-width': 2,
          'border-color': 'data(color)',
          'label': 'data(label)',
          'font-family': '"Bebas Neue", sans-serif',
          'font-size': 16,
          'text-transform': 'uppercase',
          'color': '#F5F0E8',
          'text-valign': 'top',
          'text-halign': 'center',
          'text-margin-y': -8,
          'shape': 'rectangle',
          'width': 'label',
          'height': 'label',
          'padding': 24
        }
      },
      // Artifact nodes
      {
        selector: 'node.artifact',
        style: {
          'background-color': 'data(color)',
          'background-opacity': 0.7,
          'border-width': 0,
          'label': 'data(label)',
          'font-family': '"Inter", sans-serif',
          'font-size': 11,
          'color': '#F5F0E8',
          'text-valign': 'center',
          'text-halign': 'center',
          'text-wrap': 'wrap',
          'text-max-width': 100,
          'shape': 'rectangle',
          'width': 120,
          'height': 40
        }
      },
      // Active / hovered node
      {
        selector: 'node:active, node.hover',
        style: {
          'background-opacity': 1,
          'border-width': 2,
          'border-color': '#F5F0E8',
          'overlay-opacity': 0
        }
      },
      // FEEDS_INTO edges
      {
        selector: 'edge.feeds-into',
        style: {
          'line-color': '#A09A90',
          'target-arrow-color': '#A09A90',
          'target-arrow-shape': 'triangle',
          'curve-style': 'taxi',
          'width': 2,
          'line-style': 'solid'
        }
      },
      // CONTRADICTS edges
      {
        selector: 'edge.contradicts',
        style: {
          'line-color': '#A63D2F',
          'target-arrow-shape': 'none',
          'curve-style': 'taxi',
          'width': 2,
          'line-style': 'dashed'
        }
      },
      // CONVERGES edges
      {
        selector: 'edge.converges',
        style: {
          'line-color': '#C8A43C',
          'target-arrow-shape': 'none',
          'curve-style': 'taxi',
          'width': 2,
          'line-style': 'dotted'
        }
      },
      // INFORMS edges
      {
        selector: 'edge.informs',
        style: {
          'line-color': '#5C5A56',
          'target-arrow-color': '#5C5A56',
          'target-arrow-shape': 'triangle',
          'curve-style': 'taxi',
          'width': 1,
          'line-style': 'solid'
        }
      },
      // ── Meeting nodes (gold diamond) ──
      {
        selector: 'node.meeting',
        style: {
          'background-color': '#D4A843',
          'background-opacity': 0.85,
          'border-width': 0,
          'label': 'data(label)',
          'font-family': '"Bebas Neue", sans-serif',
          'font-size': 13,
          'color': '#F5F0E8',
          'text-valign': 'bottom',
          'text-halign': 'center',
          'text-margin-y': 6,
          'shape': 'diamond',
          'width': 50,
          'height': 50
        }
      },
      // ── Speaker nodes (deep blue ellipse) ──
      {
        selector: 'node.speaker',
        style: {
          'background-color': '#1E3A6E',
          'background-opacity': 0.85,
          'border-width': 0,
          'label': 'data(label)',
          'font-family': '"Inter", sans-serif',
          'font-size': 11,
          'color': '#F5F0E8',
          'text-valign': 'bottom',
          'text-halign': 'center',
          'text-margin-y': 4,
          'shape': 'ellipse',
          'width': 40,
          'height': 40
        }
      },
      // ── Concept nodes (warm yellow square) ──
      {
        selector: 'node.concept',
        style: {
          'background-color': '#C8A43C',
          'background-opacity': 0.8,
          'border-width': 0,
          'label': 'data(label)',
          'font-family': '"Inter", sans-serif',
          'font-size': 10,
          'color': '#F5F0E8',
          'text-valign': 'bottom',
          'text-halign': 'center',
          'text-margin-y': 4,
          'shape': 'rectangle',
          'width': 30,
          'height': 30
        }
      },
      // ── Unresolved concept (red border, faded) ──
      {
        selector: 'node.concept.unresolved',
        style: {
          'border-width': 2,
          'border-color': '#A63D2F',
          'background-opacity': 0.5
        }
      },
      // ── SPOKE_IN edges ──
      {
        selector: 'edge.spoke-in',
        style: {
          'line-color': '#A09A90',
          'target-arrow-color': '#A09A90',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'width': 1,
          'line-style': 'solid'
        }
      },
      // ── FILED_TO edges ──
      {
        selector: 'edge.filed-to',
        style: {
          'line-color': '#5C5A56',
          'target-arrow-color': '#5C5A56',
          'target-arrow-shape': 'triangle',
          'curve-style': 'bezier',
          'width': 1,
          'line-style': 'solid'
        }
      },
      // ── ATTENDED edges ──
      {
        selector: 'edge.attended',
        style: {
          'line-color': '#A09A90',
          'target-arrow-shape': 'none',
          'curve-style': 'bezier',
          'width': 1,
          'line-style': 'dotted'
        }
      },
      // ── REINFORCES edges ──
      {
        selector: 'edge.reinforces',
        style: {
          'line-color': '#2D6B4A',
          'target-arrow-shape': 'none',
          'curve-style': 'bezier',
          'width': 2,
          'line-style': 'solid'
        }
      },
      // ── REFERENCES edges ──
      {
        selector: 'edge.references',
        style: {
          'line-color': '#C8A43C',
          'target-arrow-shape': 'none',
          'curve-style': 'bezier',
          'width': 1,
          'line-style': 'dotted'
        }
      },
      // ── Dimmed state for preset views ──
      {
        selector: 'node.dimmed',
        style: {
          'opacity': 0.3
        }
      }
    ];

    // ── State ──
    let cy = null;
    window.__roomIntelligence = null;
    let nodeFocused = false;
    let timelineMode = false;
    let timelineAnimInterval = null;
    let layerState = { structure: true, content: true, intelligence: true };
    let activePreset = 'room';

    // ── Initialize Graph ──
    function initGraph(data) {
      // Update room identity from graph metadata
      if (data.meta && data.meta.roomName) {
        var title = data.meta.roomName + ' \u2014 Data Room';
        document.getElementById('header-title').textContent = title;
        document.title = title + ' | MindrianOS';
      }

      // Store intelligence for Plan 02 chat
      window.__roomIntelligence = data.intelligence || null;

      // Count artifact nodes
      const artifactNodes = data.elements.nodes.filter(
        n => n.classes && n.classes.includes('artifact')
      );

      // Show/hide empty state
      const emptyState = document.getElementById('empty-state');
      if (artifactNodes.length === 0) {
        emptyState.classList.add('visible');
      } else {
        emptyState.classList.remove('visible');
      }

      // Choose layout based on node count
      const totalNodes = data.elements.nodes.length;
      const layoutConfig = totalNodes >= 13
        ? {
            name: 'cose',
            nodeRepulsion: function() { return 8000; },
            idealEdgeLength: function() { return 120; },
            gravity: 0.25,
            animate: false,
            padding: 40
          }
        : {
            name: 'grid',
            rows: 2,
            padding: 40,
            animate: false
          };

      // Destroy previous instance
      if (cy) {
        cy.destroy();
      }

      // Stop any running timeline animations
      stopTimelineAnimations();
      timelineMode = false;
      document.getElementById('btn-timeline').classList.remove('active');

      cy = cytoscape({
        container: document.getElementById('cy'),
        elements: {
          nodes: data.elements.nodes,
          edges: data.elements.edges
        },
        style: graphStyle,
        layout: layoutConfig,
        minZoom: 0.3,
        maxZoom: 3,
        wheelSensitivity: 0.3
      });

      // ── Apply saved positions from localStorage ──
      applySavedPositions();

      // ── Events ──

      // Click any tappable node -> show detail panel
      cy.on('tap', 'node', function(evt) {
        const node = evt.target;
        if (node.hasClass('section-group')) return;
        const d = node.data();
        const classes = node.classes();
        showDetailPanel(d, classes);
      });

      // Click background -> hide detail panel
      cy.on('tap', function(evt) {
        if (evt.target === cy) {
          hideDetailPanel();
        }
      });

      // Hover node -> highlight connected edges
      cy.on('mouseover', 'node', function(evt) {
        const node = evt.target;
        if (node.hasClass('section-group')) return;
        nodeFocused = true;
        node.addClass('hover');
        node.connectedEdges().style({ 'opacity': 1, 'width': 3 });
        cy.elements().not(node).not(node.connectedEdges()).not(node.connectedEdges().connectedNodes()).style({ 'opacity': 0.3 });
      });

      cy.on('mouseout', 'node', function(evt) {
        const node = evt.target;
        if (node.hasClass('section-group')) return;
        nodeFocused = false;
        node.removeClass('hover');
        cy.elements().style({ 'opacity': 1 });
        // Restore edge default widths
        cy.edges('.feeds-into, .contradicts, .converges, .reinforces').style({ 'width': 2 });
        cy.edges('.informs, .spoke-in, .filed-to, .attended, .references').style({ 'width': 1 });
        // Re-apply dimmed state if a preset requires it
        if (activePreset === 'intel') {
          cy.nodes('[layer="content"]').addClass('dimmed');
        }
      });

      // ── Edge hover: show label ──
      var edgeTooltip = document.getElementById('edge-tooltip');
      cy.on('mouseover', 'edge', function(evt) {
        if (nodeFocused) return;
        var edge = evt.target;
        var edgeType = edge.data('type') || edge.classes().join(', ');
        edgeTooltip.textContent = edgeType;
        edgeTooltip.style.display = 'block';
        var pos = evt.renderedPosition || evt.position;
        if (pos) {
          edgeTooltip.style.left = (pos.x + 60) + 'px';
          edgeTooltip.style.top = (pos.y + 48) + 'px';
        }
      });

      cy.on('mouseout', 'edge', function() {
        edgeTooltip.style.display = 'none';
      });

      cy.on('mousemove', 'edge', function(evt) {
        if (nodeFocused) { edgeTooltip.style.display = 'none'; return; }
        var pos = evt.renderedPosition || evt.position;
        if (pos) {
          edgeTooltip.style.left = (pos.x + 60) + 'px';
          edgeTooltip.style.top = (pos.y + 48) + 'px';
        }
      });

      // ── Position persistence on drag ──
      cy.on('dragfree', 'node', function(evt) {
        saveNodePositions();
      });

      // Apply current layer state
      applyLayerState();
    }

    // ── Position Persistence ──
    function saveNodePositions() {
      if (!cy) return;
      var positions = {};
      cy.nodes().forEach(function(node) {
        var p = node.position();
        positions[node.id()] = { x: p.x, y: p.y };
      });
      try {
        localStorage.setItem('graphPositions', JSON.stringify(positions));
      } catch (e) { /* quota exceeded -- ignore */ }
    }

    function applySavedPositions() {
      if (!cy) return;
      var saved;
      try {
        saved = JSON.parse(localStorage.getItem('graphPositions') || '{}');
      } catch (e) { return; }
      if (!saved || Object.keys(saved).length === 0) return;

      var currentIds = new Set();
      cy.nodes().forEach(function(n) { currentIds.add(n.id()); });

      // Clean stale IDs
      var cleaned = {};
      Object.keys(saved).forEach(function(id) {
        if (currentIds.has(id)) cleaned[id] = saved[id];
      });
      try {
        localStorage.setItem('graphPositions', JSON.stringify(cleaned));
      } catch (e) { /* ignore */ }

      // Apply saved positions
      var hasUnsaved = false;
      cy.nodes().forEach(function(node) {
        if (cleaned[node.id()]) {
          node.position(cleaned[node.id()]);
        } else {
          hasUnsaved = true;
        }
      });

      // If some nodes are new, run CoSE on just those
      if (hasUnsaved) {
        var newNodes = cy.nodes().filter(function(n) { return !cleaned[n.id()]; });
        if (newNodes.length > 0 && newNodes.length < cy.nodes().length) {
          newNodes.layout({
            name: 'cose',
            nodeRepulsion: function() { return 4000; },
            idealEdgeLength: function() { return 80; },
            gravity: 0.5,
            animate: false,
            padding: 20,
            fit: false
          }).run();
        }
      }
    }

    // ── Layer Toggles ──
    function toggleLayer(layerName, show) {
      if (!cy) return;
      layerState[layerName] = show;
      applyLayerState();
    }

    function applyLayerState() {
      if (!cy) return;
      ['structure', 'content', 'intelligence'].forEach(function(layer) {
        var nodes = cy.nodes('[layer="' + layer + '"]');
        if (layerState[layer]) {
          nodes.show();
        } else {
          nodes.hide();
          // Hide edges connected to hidden nodes
          nodes.connectedEdges().hide();
        }
      });
      // Show edges where both ends are visible
      cy.edges().forEach(function(edge) {
        var src = edge.source();
        var tgt = edge.target();
        if (src.visible() && tgt.visible()) {
          edge.show();
        } else {
          edge.hide();
        }
      });
    }

    // ── Preset Views ──
    function applyPreset(presetName) {
      if (!cy) return;
      activePreset = presetName;

      // Remove dimmed from all
      cy.nodes().removeClass('dimmed');
      // Reset all layers visible first
      layerState = { structure: true, content: true, intelligence: true };

      switch (presetName) {
        case 'room':
          // Structure + Content visible, Intelligence hidden
          layerState.intelligence = false;
          break;
        case 'meetings':
          // Structure visible, only meeting + speaker nodes in Content, artifacts hidden
          layerState.intelligence = false;
          break;
        case 'team':
          // Only speaker + meeting nodes visible
          layerState.structure = false;
          layerState.intelligence = false;
          break;
        case 'intel':
          // All layers visible, content nodes dimmed
          break;
      }

      // Update layer toggle button states
      document.querySelectorAll('.layer-btn').forEach(function(btn) {
        var layer = btn.getAttribute('data-layer');
        if (layerState[layer]) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      applyLayerState();

      // Additional filtering per preset
      if (presetName === 'meetings') {
        // Hide artifacts, show only meetings + speakers + sections
        cy.nodes('.artifact').hide();
        cy.nodes('.concept').hide();
      } else if (presetName === 'team') {
        // Only speakers and meetings
        cy.nodes('.artifact').hide();
        cy.nodes('.concept').hide();
        cy.nodes('.section-group').hide();
        cy.nodes('.speaker, .meeting').show();
        // Only show SPOKE_IN, ATTENDED edges
        cy.edges().hide();
        cy.edges('.spoke-in, .attended').forEach(function(e) {
          if (e.source().visible() && e.target().visible()) e.show();
        });
      } else if (presetName === 'intel') {
        // All visible, but content nodes dimmed
        cy.nodes('[layer="content"]').addClass('dimmed');
        cy.nodes('.concept').removeClass('dimmed');
      }

      // Update preset button states
      document.querySelectorAll('.preset-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-preset') === presetName);
      });
    }

    // ── Detail Panel ──
    function showDetailPanel(data, classes) {
      const panel = document.getElementById('detail-panel');
      const bar = document.getElementById('detail-section-bar');
      const title = document.getElementById('detail-title');
      const fields = document.getElementById('detail-fields');

      const sectionColor = data.color || '#5C5A56';
      bar.style.background = sectionColor;
      title.textContent = data.label || data.id;

      let html = '';
      var classList = classes || [];

      // ── Meeting node detail ──
      if (classList.indexOf('meeting') !== -1) {
        if (data.meeting_date) {
          html += fieldHTML('Date', data.meeting_date);
        }
        if (data.speakers) {
          html += fieldHTML('Speakers', data.speakers);
        }
        // Count decisions and action items from connected edges
        if (cy) {
          var node = cy.getElementById(data.id);
          var filedEdges = node.connectedEdges('.filed-to');
          html += fieldHTML('Filed Artifacts', '' + filedEdges.length);
          var attendees = node.connectedEdges('.attended, .spoke-in').connectedNodes('.speaker');
          if (attendees.length > 0) {
            var names = [];
            attendees.forEach(function(n) { names.push(n.data('label') || n.id()); });
            html += fieldHTML('Attendees', names.join(', '));
          }
        }
        html += fieldHTML('Layer', data.layer || 'content');
      }
      // ── Speaker node detail ──
      else if (classList.indexOf('speaker') !== -1) {
        if (data.role) {
          html += fieldHTML('Role', data.role);
        }
        if (data.role_type) {
          html += fieldHTML('Role Type', data.role_type);
        }
        // Connected meetings
        if (cy) {
          var node = cy.getElementById(data.id);
          var meetings = node.connectedEdges('.spoke-in, .attended').connectedNodes('.meeting');
          if (meetings.length > 0) {
            var mNames = [];
            meetings.forEach(function(n) { mNames.push(n.data('label') || n.id()); });
            html += fieldHTML('Meetings', mNames.join(', '));
          }
        }
        html += fieldHTML('Layer', data.layer || 'content');
      }
      // ── Concept node detail ──
      else if (classList.indexOf('concept') !== -1) {
        var isUnresolved = classList.indexOf('unresolved') !== -1;
        html += fieldHTML('Status', isUnresolved ? 'Unresolved' : 'Resolved');
        // Referencing artifacts
        if (cy) {
          var node = cy.getElementById(data.id);
          var refs = node.connectedEdges('.references').connectedNodes('.artifact');
          if (refs.length > 0) {
            var rNames = [];
            refs.forEach(function(n) { rNames.push(n.data('label') || n.id()); });
            html += fieldHTML('Referenced By', rNames.join(', '));
          }
        }
        html += fieldHTML('Layer', data.layer || 'intelligence');
      }
      // ── Artifact node detail (existing) ──
      else {
        if (data.section) {
          html += fieldHTML('Section', data.section.replace(/-/g, ' '));
        }
        if (data.methodology) {
          html += fieldHTML('Methodology', data.methodology);
        }
        if (data.created) {
          html += fieldHTML('Created', data.created);
        }
        if (data.pipeline) {
          html += fieldHTML('Pipeline', data.pipeline);
        }
        if (data.pipeline_stage) {
          html += fieldHTML('Pipeline Stage', data.pipeline_stage, true);
        }
        if (data.id) {
          html += fieldHTML('File', 'room/' + data.id + '.md', true);
        }
      }

      fields.innerHTML = html;
      panel.classList.add('open');
    }

    function hideDetailPanel() {
      document.getElementById('detail-panel').classList.remove('open');
    }

    function fieldHTML(label, value, mono) {
      return '<div class="detail-field">' +
        '<div class="detail-field-label">' + label + '</div>' +
        '<div class="detail-field-value' + (mono ? ' mono' : '') + '">' + escapeHTML(value) + '</div>' +
        '</div>';
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // ── Close button ──
    document.getElementById('detail-close').addEventListener('click', hideDetailPanel);

    // ── Refresh button ──
    document.getElementById('btn-refresh').addEventListener('click', function() {
      loadGraph();
    });

    // ── Load graph data ──
    function loadGraph() {
      fetch('graph.json?t=' + Date.now())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          initGraph(data);
        })
        .catch(function(err) {
          console.error('Failed to load graph.json:', err);
          document.getElementById('empty-state').classList.add('visible');
        });
    }

    // ── Chat Intelligence ──
    let isFirstResponse = true;

    function handleChatQuery(query, intelligence) {
      if (!intelligence) {
        return 'Loading room intelligence... Try refreshing.';
      }

      const q = query.toLowerCase();
      let prefix = '';
      if (isFirstResponse) {
        prefix = "<strong>Here's what I see in your room...</strong><br><br>";
        isFirstResponse = false;
      }

      // 1. Gap queries
      if (/gap|missing|empty|need/i.test(q)) {
        const gaps = intelligence.gaps || [];
        if (gaps.length === 0) {
          return prefix + 'No gaps detected -- your room coverage is strong.';
        }
        let lines = gaps.map(function(g) {
          var conf = formatConfidence(g.confidence);
          return conf + ' <strong>' + escapeHTML(g.section) + '</strong>: ' + escapeHTML(g.message);
        });
        return prefix + lines.join('<br>');
      }

      // 2. Contradiction queries
      if (/contradict|conflict|mismatch|inconsisten/i.test(q)) {
        var contras = intelligence.contradictions || [];
        if (contras.length === 0) {
          return prefix + 'No contradictions found between sections.';
        }
        var lines = contras.map(function(c) {
          return '<strong>' + escapeHTML(c.section_a) + '</strong> vs <strong>' + escapeHTML(c.section_b) + '</strong>: ' + escapeHTML(c.message) + ' (' + formatConfidence(c.confidence) + ')';
        });
        return prefix + lines.join('<br>');
      }

      // 3. Convergence queries
      if (/converg|theme|pattern|common|shared/i.test(q)) {
        var conv = intelligence.convergence || [];
        if (conv.length === 0) {
          return prefix + 'No convergence patterns yet -- add more artifacts to build connections.';
        }
        var lines = conv.map(function(c) {
          return '<strong>' + escapeHTML(c.term) + '</strong> appears across ' + c.count + ' sections';
        });
        return prefix + lines.join('<br>');
      }

      // 4. Summary queries
      if (/summar|overview|status|how.*(doing|look|room)/i.test(q)) {
        var s = intelligence.summary || {};
        var line = 'Room: <strong>' + (s.total_artifacts || 0) + '</strong> artifacts across <strong>' + (s.sections_active || 0) + '</strong> sections (' + (s.sections_empty || 0) + ' empty). Stage: <strong>' + escapeHTML(s.venture_stage || 'Unknown') + '</strong>.';
        return prefix + line;
      }

      // 5. Section-specific queries
      var sectionMatch = matchSection(q);
      if (sectionMatch) {
        return prefix + formatSectionInfo(sectionMatch);
      }

      // 6. Edge/pipeline queries
      if (/feeds|chain|pipeline|flow/i.test(q)) {
        return prefix + formatPipelineInfo();
      }

      // 7. Fallback
      return prefix + 'I can answer about gaps, contradictions, convergence themes, and section status. For deeper AI analysis, use <strong>/mos:room</strong> in your Claude session.';
    }

    function formatConfidence(level) {
      if (level === 'HIGH') {
        return '<span class="confidence-high">[HIGH]</span>';
      }
      if (level === 'MEDIUM') {
        return '<span class="confidence-medium">[MEDIUM]</span>';
      }
      return '[' + escapeHTML(level || 'LOW') + ']';
    }

    function matchSection(query) {
      if (!cy) return null;
      var sectionNodes = cy.nodes('.section-group');
      var best = null;
      sectionNodes.forEach(function(node) {
        var sectionId = node.data('id') || '';
        var label = (node.data('label') || '').toLowerCase();
        var words = sectionId.replace(/-/g, ' ').split(' ');
        words.forEach(function(w) {
          if (w.length > 3 && query.indexOf(w) !== -1) {
            best = node;
          }
        });
        if (query.indexOf(label.toLowerCase()) !== -1) {
          best = node;
        }
      });
      return best;
    }

    function formatSectionInfo(sectionNode) {
      var id = sectionNode.data('id');
      var label = sectionNode.data('label') || id;
      var color = sectionNode.data('color') || '#5C5A56';
      var artifacts = cy.nodes('.artifact').filter(function(n) {
        return n.data('section') === id;
      });
      if (artifacts.length === 0) {
        return '<strong>' + escapeHTML(label) + '</strong>: No artifacts yet. This section is empty.';
      }
      var names = [];
      artifacts.forEach(function(n) { names.push(escapeHTML(n.data('label') || n.data('id'))); });
      return '<strong>' + escapeHTML(label) + '</strong>: ' + artifacts.length + ' artifact(s) -- ' + names.join(', ');
    }

    function formatPipelineInfo() {
      if (!cy) return 'No graph data loaded.';
      var feedEdges = cy.edges('.feeds-into');
      if (feedEdges.length === 0) {
        return 'No pipeline connections found yet.';
      }
      var lines = [];
      feedEdges.forEach(function(e) {
        var src = e.source().data('label') || e.source().data('id');
        var tgt = e.target().data('label') || e.target().data('id');
        lines.push(escapeHTML(src) + ' -> ' + escapeHTML(tgt));
      });
      return '<strong>Pipeline flow:</strong><br>' + lines.join('<br>');
    }

    function addChatMessage(text, type) {
      var container = document.getElementById('chat-messages');
      var div = document.createElement('div');
      div.className = 'chat-msg ' + type;
      if (type === 'user') {
        div.textContent = text;
      } else {
        div.innerHTML = text;
      }
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function submitChat() {
      var input = document.getElementById('chat-input');
      var query = input.value.trim();
      if (!query) return;

      addChatMessage(query, 'user');
      input.value = '';

      var response = handleChatQuery(query, window.__roomIntelligence);
      addChatMessage(response, 'bot');
    }

    // ── Chat event listeners ──
    document.getElementById('chat-send').addEventListener('click', submitChat);
    document.getElementById('chat-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { submitChat(); }
    });

    // Quick-action buttons
    document.querySelectorAll('.chat-quick-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var query = btn.getAttribute('data-query');
        document.getElementById('chat-input').value = query;
        submitChat();
      });
    });

    // ── Layer toggle event listeners ──
    document.querySelectorAll('.layer-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        btn.classList.toggle('active');
        var layer = btn.getAttribute('data-layer');
        toggleLayer(layer, btn.classList.contains('active'));
      });
    });

    // ── Preset view event listeners ──
    document.querySelectorAll('.preset-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        applyPreset(btn.getAttribute('data-preset'));
      });
    });

    // ── Timeline Mode ──

    function stopTimelineAnimations() {
      if (timelineAnimInterval) {
        clearInterval(timelineAnimInterval);
        timelineAnimInterval = null;
      }
    }

    // Map date string to X pixel position
    function dateToX(dateStr, minDate, maxDate, containerWidth) {
      var padLeft = 100;
      var padRight = 100;
      var usableWidth = containerWidth - padLeft - padRight;

      if (!dateStr) return padLeft; // missing date -> left edge

      var d = new Date(dateStr + 'T00:00:00');
      if (isNaN(d.getTime())) return padLeft;

      // Single meeting -> center
      if (minDate === maxDate) return containerWidth / 2;

      var range = maxDate - minDate;
      if (range === 0) return containerWidth / 2;

      var fraction = (d.getTime() - minDate) / range;
      return padLeft + fraction * usableWidth;
    }

    // Map section ID to Y pixel position
    function sectionToY(sectionId, containerHeight) {
      var sections = [
        'problem-definition', 'market-analysis', 'solution-design',
        'business-model', 'competitive-analysis', 'team-execution',
        'legal-ip', 'financial-model'
      ];
      var padTop = 200; // meetings row at Y=100, sections start at 200
      var padBottom = 100;
      var usableHeight = containerHeight - padTop - padBottom;
      var idx = sections.indexOf(sectionId);
      if (idx === -1) idx = 0;
      var step = usableHeight / Math.max(sections.length - 1, 1);
      return padTop + idx * step;
    }

    function enterTimelineMode() {
      if (!cy) return;
      timelineMode = true;
      document.getElementById('btn-timeline').classList.add('active');

      // Collect meeting dates
      var meetingNodes = cy.nodes('.meeting');
      var dates = [];
      meetingNodes.forEach(function(n) {
        var d = n.data('meeting_date');
        if (d) {
          var t = new Date(d + 'T00:00:00').getTime();
          if (!isNaN(t)) dates.push(t);
        }
      });

      var minDate = dates.length > 0 ? Math.min.apply(null, dates) : Date.now();
      var maxDate = dates.length > 0 ? Math.max.apply(null, dates) : Date.now();

      var container = document.getElementById('cy');
      var cw = container.clientWidth || 1200;
      var ch = container.clientHeight || 600;

      // Hide speakers and concepts in timeline mode (reduce clutter)
      cy.nodes('.speaker').hide();
      cy.nodes('.concept').hide();

      // Build position map
      var positionMap = {};

      // Meeting nodes: X by date, Y at top row
      meetingNodes.forEach(function(n) {
        positionMap[n.id()] = {
          x: dateToX(n.data('meeting_date'), minDate, maxDate, cw),
          y: 100
        };
      });

      // Section-group nodes: horizontal band labels on Y axis
      cy.nodes('.section-group').forEach(function(n) {
        positionMap[n.id()] = {
          x: cw / 2,
          y: sectionToY(n.id(), ch)
        };
      });

      // Artifact nodes: X by created date or parent meeting date, Y by section
      cy.nodes('.artifact').forEach(function(n) {
        var artifactDate = n.data('created') || null;
        // If filed from a meeting, try to find the meeting date
        if (!artifactDate) {
          var filedEdges = n.connectedEdges('.filed-to');
          if (filedEdges.length > 0) {
            var meetingNode = filedEdges.connectedNodes('.meeting').first();
            if (meetingNode && meetingNode.data('meeting_date')) {
              artifactDate = meetingNode.data('meeting_date');
            }
          }
        }
        var xPos = dateToX(artifactDate, minDate, maxDate, cw);
        var section = n.data('section') || n.data('parent') || 'problem-definition';
        var yPos = sectionToY(section, ch);
        positionMap[n.id()] = { x: xPos, y: yPos };
      });

      // Run preset layout with positions function
      cy.layout({
        name: 'preset',
        positions: function(node) {
          return positionMap[node.id()] || { x: 100, y: ch / 2 };
        },
        animate: true,
        animationDuration: 300,
        fit: true,
        padding: 40
      }).run();

      // Start edge animations for REINFORCES (green pulse) and CONTRADICTS (red pulse)
      startTimelineEdgeAnimations();
    }

    function exitTimelineMode() {
      if (!cy) return;
      timelineMode = false;
      document.getElementById('btn-timeline').classList.remove('active');

      // Stop animations
      stopTimelineAnimations();

      // Reset edge styles
      cy.edges('.reinforces').style({ 'width': 2, 'opacity': 1 });
      cy.edges('.contradicts').style({ 'width': 2, 'opacity': 1 });

      // Restore speaker/concept visibility based on layer state
      if (layerState.content) {
        cy.nodes('.speaker').show();
      }
      if (layerState.intelligence) {
        cy.nodes('.concept').show();
      }

      // Re-apply current preset filters
      applyPreset(activePreset);

      // Re-run CoSE layout
      cy.layout({
        name: 'cose',
        nodeRepulsion: function() { return 8000; },
        idealEdgeLength: function() { return 120; },
        gravity: 0.25,
        animate: true,
        animationDuration: 300,
        padding: 40
      }).run();
    }

    function startTimelineEdgeAnimations() {
      stopTimelineAnimations();
      var tick = 0;
      timelineAnimInterval = setInterval(function() {
        if (!cy || !timelineMode) { stopTimelineAnimations(); return; }
        tick++;
        // Pulse REINFORCES edges: oscillate width between 2 and 4, opacity between 0.6 and 1
        var reinforcesWidth = 2 + 2 * Math.abs(Math.sin(tick * 0.15));
        var reinforcesOpacity = 0.6 + 0.4 * Math.abs(Math.sin(tick * 0.15));
        cy.edges('.reinforces').style({ 'width': reinforcesWidth, 'opacity': reinforcesOpacity });

        // Pulse CONTRADICTS edges: oscillate width between 2 and 4, phase-shifted
        var contradictsWidth = 2 + 2 * Math.abs(Math.cos(tick * 0.12));
        var contradictsOpacity = 0.6 + 0.4 * Math.abs(Math.cos(tick * 0.12));
        cy.edges('.contradicts').style({ 'width': contradictsWidth, 'opacity': contradictsOpacity });
      }, 60);
    }

    // ── Timeline toggle event listener ──
    document.getElementById('btn-timeline').addEventListener('click', function() {
      if (timelineMode) {
        exitTimelineMode();
      } else {
        enterTimelineMode();
      }
    });

    // ── Boot ──
    loadGraph();
  </script>
</body>
</html>
